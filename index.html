<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pokémon Yon GBA</title>

<style>
body{
  margin:0;
  background:#000;
  overflow:hidden;
  font-family:monospace;
}

/* SCREEN */
.screen{display:none;position:absolute;inset:0}
.screen.active{display:block}

/* MENU */
#menu{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
  color:white;
}

/* GAME */
#game{
  position:relative;
  width:100vw;
  height:100vh;
  background:url('img-fondo1.gif') center/cover;
}

/* GRID TILE FEEL */
.tile{
  position:absolute;
  width:48px;
  height:48px;
}

/* PLAYER */
.player{
  width:48px;
  height:48px;
  position:absolute;
  background-size:contain;
  background-repeat:no-repeat;
  transform-origin:bottom center;
  transition: transform 0.1s linear;
}

#yon{background-image:url('Yon.png')}
#pika{background-image:url('pikachu.png')}

/* sombra */
.player::after{
  content:"";
  position:absolute;
  bottom:-5px;
  left:50%;
  transform:translateX(-50%);
  width:60%;
  height:6px;
  background:rgba(0,0,0,0.5);
  border-radius:50%;
}

/* HUD */
#hud{
  position:absolute;
  top:10px;
  left:10px;
  color:white;
}

/* BATTLE */
#battle{
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  height:100vh;
  color:white;
  background:black;
}

/* FINAL */
#final{
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
  height:100vh;
}

#letter{white-space:pre-line}
</style>
</head>

<body>

<div id="menu" class="screen active">
  <h1>POKÉMON YON</h1>
  <button onclick="startGame()">Nueva Aventura</button>
</div>

<div id="game" class="screen">
  <div id="yon" class="player"></div>
  <div id="pika" class="player"></div>
  <div id="hud">Amor: <span id="love">0</span></div>
</div>

<div id="battle" class="screen">
  <h2>Batalla emo-cional</h2>
  <button onclick="choice(2)">⚡ Amar x100pre</button>
  <button onclick="choice(1)">💛 Confiar</button>
  <button onclick="choice(-1)">💔 Dudar?</button>
</div>

<div id="final" class="screen">
  <div id="letter"></div>
</div>

<script>
/* ========= CONFIG ========= */
const TILE = 48;

/* ========= STATE ========= */
let mode="menu";
let love=0;

/* GRID POSITION (tipo Pokémon) */
let grid = {x:4,y:2};
let moving=false;

/* FOLLOW */
let trail=[];

/* ELEMENTS */
const yon = document.getElementById("yon");
const pika = document.getElementById("pika");

/* ========= SCREEN ========= */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* ========= START ========= */
function startGame(){
  mode="game";
  show("game");
  update();
}

/* ========= MOVEMENT ========= */
document.addEventListener("keydown",e=>{
  if(mode!=="game" || moving) return;

  let dx=0,dy=0;

  if(e.key==="ArrowUp") dy=-1;
  if(e.key==="ArrowDown") dy=1;
  if(e.key==="ArrowLeft") dx=-1;
  if(e.key==="ArrowRight") dx=1;

  if(dx!==0 || dy!==0){
    move(dx,dy);
  }
});

function move(dx,dy){
  moving=true;

  grid.x+=dx;
  grid.y+=dy;

  animateMove(()=>{

    // zona de pasto (abajo)
    if(grid.y>6){
      encounter();
    }

    moving=false;
  });
}

/* ========= ANIMATION ========= */
function animateMove(cb){
  let startX = yon.offsetLeft;
  let startY = yon.offsetTop;

  let endX = grid.x*TILE;
  let endY = grid.y*TILE;

  let t=0;

  function step(){
    t+=0.1;

    let x = startX + (endX-startX)*t;
    let y = startY + (endY-startY)*t;

    yon.style.left = x+"px";
    yon.style.top = y+"px";

    // follow Pikachu
    let target = trail[0] || {x:endX,y:endY};

    let px = parseFloat(pika.style.left)||x;
    let py = parseFloat(pika.style.top)||y;

    px += (target.x - px)*0.2;
    py += (target.y - py)*0.2;

    pika.style.left = px+"px";
    pika.style.top = py+"px";

    if(t<1){
      requestAnimationFrame(step);
    }else{
      trail.push({x:endX,y:endY});
      if(trail.length>10) trail.shift();
      if(cb) cb();
    }
  }

  step();
}

/* ========= ENCOUNTER ========= */
function encounter(){
  if(Math.random()<0.3){
    startBattle();
  }
}

/* ========= BATTLE ========= */
function startBattle(){
  mode="battle";
  show("battle");
}

function choice(v){
  love+=v;
  document.getElementById("love").textContent=love;

  if(love>=10){
    finalScene();
  }else{
    mode="game";
    show("game");
  }
}

/* ========= FINAL ========= */
function finalScene(){
  mode="final";
  show("final");

  document.getElementById("letter").textContent = `
Hola Yon... ♥

Feliz cumpleaños.

Pensé en escribirte algo súper profundo...
pero ya sabes que lo mío no es ser cursi.

Así que bueno, lo intentaré jiji

Te amooo.

Pero, sobre todo...
te respeto.
y te admiro muchísimo.

Admiro tu capacidad para soportarme kjjsj...

y la persona increíble que eres.

Aún cuando todo se pone difícil...

yo sigo eligiéndote.
`;
}

/* ========= INIT ========= */
function update(){
  yon.style.left = grid.x*TILE+"px";
  yon.style.top = grid.y*TILE+"px";

  pika.style.left = (grid.x*TILE-50)+"px";
  pika.style.top = (grid.y*TILE)+"px";
}
</script>

</body>
</html>
