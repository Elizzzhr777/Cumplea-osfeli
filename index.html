<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Aventura Pokémon para Yon</title>

<style>
body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

/* ✨ BORDES GLOW */
button, .level-btn, #letter, .playlist-container, .transition-box {
  box-shadow: 0 0 10px rgba(255,203,5,0.4);
}

/* Pantallas */
.screen {
  display: none;
  width: 100vw;
  height: 100vh;
  position: absolute;
  inset: 0;
  animation: fadeIn 0.8s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: scale(1.03); }
  to { opacity: 1; transform: scale(1); }
}

/* MENÚ Y MAPA */
#menu, #level-select {
  flex-direction: column; justify-content: center; align-items: center;
  background: url('img-fondo1.gif') center/cover no-repeat;
}

.level-btn {
  width: 350px; display: flex; align-items: center; gap: 15px;
  margin-bottom: 15px; background: rgba(0,0,0,0.8); color: #ffcb05; 
  border: 2px solid #ffcb05; padding: 10px; border-radius: 15px;
  transition: 0.3s;
}
.level-btn:hover { transform: scale(1.05); }
.level-btn img { width: 40px; height: 40px; }

.locked { opacity: 0.5; filter: grayscale(100%); pointer-events: none; }

/* FINAL */
#final { 
  justify-content: center; align-items: center;
  background: url('Image-final.jpg') center/contain no-repeat #111;
  opacity: 0;
  transition: opacity 2s ease;
}
#final.show-bg { opacity: 1; }

#letter {
  background: rgba(0,0,0,0.85);
  padding: 30px;
  border: 2px solid #ffcb05;
  border-radius: 20px;
  white-space: pre-wrap;
}

/* BOTONES */
button {
  padding: 15px 35px; cursor: pointer; background: #ffcb05; color: #2a75bb; 
  border: none; border-radius: 30px;
}
button:hover { transform: scale(1.05); }

/* PARTICULAS */
#particles-final {
  position:absolute;
  width:100%;
  height:100%;
  pointer-events:none;
}
</style>
</head>

<body>

<!-- MUSICA ORIGINAL -->
<audio id="music_menu" src="cloud9.mp3" loop></audio>
<audio id="music_game" src="just_the_way.mp3" loop></audio>
<audio id="music_battle" src="gone.mp3" loop></audio>
<audio id="music_final" src="extra.mp3" loop></audio>

<!-- SFX -->
<audio id="sfx_click" src="click.mp3"></audio>
<audio id="sfx_hover" src="hover.mp3"></audio>

<div id="menu" class="screen" style="display:flex;">
  <h1>¡20 años de supervivencia!</h1>
  <button onclick="showLevels()">INICIAR AVENTURA</button>
</div>

<div id="level-select" class="screen">
  <button id="btn-lvl1" class="level-btn" onclick="startSpecificLevel(1)">
    <img src="icono-nivel-1.gif"> NIVEL 1
  </button>
  <button id="btn-lvl2" class="level-btn locked" onclick="startSpecificLevel(2)">
    <img src="icono-nivel-2.gif"> NIVEL 2
  </button>
  <button id="btn-lvl3" class="level-btn locked" onclick="startSpecificLevel(3)">
    <img src="icono-nivel-3.gif"> NIVEL 3
  </button>
</div>

<div id="playlist-screen" class="screen">
  <button onclick="completeCurrentLevel()">LISTO</button>
</div>

<div id="battle" class="screen">
  <button onclick="choice(999)">AMAR</button>
</div>

<div id="final" class="screen">
  <canvas id="particles-final"></canvas>
  <div id="letter"></div>
</div>

<script>
let currentPlayingLevel = 1;
let highestUnlockedLevel = 1;

function hideAllScreens(){
  document.querySelectorAll('.screen').forEach(el=>el.style.display="none");
}

function showLevels(){
  hideAllScreens();
  document.getElementById("level-select").style.display="flex";
}

function startSpecificLevel(level){
  hideAllScreens();
  currentPlayingLevel=level;

  if(level===1){
    document.getElementById("playlist-screen").style.display="flex";
  }
  if(level===2){
    document.getElementById("battle").style.display="flex";
  }
  if(level===3){
    const final=document.getElementById("final");
    final.style.display="flex";
    setTimeout(()=>final.classList.add("show-bg"),300);
    triggerFinalText();
    startParticles();
  }
}

function completeCurrentLevel(){
  highestUnlockedLevel++;
}

function choice(v){
  if(v===999){ startSpecificLevel(3); }
}

/* TEXTO ORIGINAL */
function triggerFinalText(){
  const text=`Hola Yon... ♥\n\nFeliz cumpleaños.\n Te amo mucho.`;
  let i=0;
  const box=document.getElementById("letter");
  box.textContent="";

  const interval=setInterval(()=>{
    box.textContent+=text[i];
    i++;
    if(i>=text.length){ clearInterval(interval);}
  },50);
}

/* SONIDOS */
function playSFX(id){
  const s=document.getElementById(id);
  if(s){ s.currentTime=0; s.play().catch(()=>{});}
}

document.querySelectorAll("button").forEach(btn=>{
  btn.addEventListener("mouseenter",()=>playSFX("sfx_hover"));
  btn.addEventListener("click",()=>playSFX("sfx_click"));
});

/* PARTICULAS */
function startParticles(){
  const canvas=document.getElementById("particles-final");
  const ctx=canvas.getContext("2d");
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;

  let p=[];
  for(let i=0;i<60;i++){
    p.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height});
  }

  setInterval(()=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#ffcb05";
    p.forEach(e=>{
      ctx.beginPath();
      ctx.arc(e.x,e.y,2,0,Math.PI*2);
      ctx.fill();
      e.y-=0.5;
      if(e.y<0)e.y=canvas.height;
    });
  },30);
}
</script>
</body>
</html>
