<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Aventura Pokémon para Yon</title>

<style>
body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
.screen { display: none; width: 100vw; height: 100vh; position: absolute; inset: 0; animation: fadeIn 0.8s ease; }

@keyframes fadeIn {
  from { opacity: 0; transform: scale(1.05); }
  to { opacity: 1; transform: scale(1); }
}

/* MENÚ Y MAPA */
#menu, #level-select {
  flex-direction: column; justify-content: center; align-items: center;
  background: url('img-fondo1.gif') center/cover no-repeat;
}

h1 {
  animation: glowText 2s infinite alternate;
}

@keyframes glowText {
  from { text-shadow: 0 0 10px #fff; }
  to { text-shadow: 0 0 25px #ffcb05, 0 0 35px #2a75bb; }
}

.level-btn {
  width: 350px; display: flex; align-items: center; justify-content: flex-start; gap: 15px;
  margin-bottom: 15px; background: rgba(0,0,0,0.8); color: #ffcb05; 
  border: 2px solid #ffcb05; padding: 10px; border-radius: 15px; transition: 0.3s;
}
.level-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px #ffcb05; }

.level-btn img { width: 40px; height: 40px; object-fit: contain; }
.locked { opacity: 0.5; filter: grayscale(100%); cursor: not-allowed; pointer-events: none; }

/* PLAYLIST */
#playlist-screen {
  flex-direction: column; justify-content: center; align-items: center;
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('img-fondo1.gif') center/cover no-repeat;
}
.playlist-container {
  background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
  padding: 30px; border-radius: 25px; border: 3px solid #ffcb05;
  width: 80%; max-width: 450px; text-align: center;
}
.song-item {
  background: rgba(0, 0, 0, 0.6); margin: 10px 0; padding: 15px;
  border-radius: 15px; cursor: pointer; border: 1px solid transparent;
  transition: 0.2s; display: flex; align-items: center; justify-content: space-between;
}
.song-item:hover { transform: translateX(5px) scale(1.03); border-color: #ffcb05; background: rgba(42, 117, 187, 0.4); }
.song-item.active { background: #2a75bb; border-color: #fff; }

/* TRANSICIÓN */
#level-transition {
  flex-direction: column; justify-content: center; align-items: center;
  background: rgba(0,0,0,0.9); z-index: 200;
}
.transition-box {
  background: #111; padding: 40px; border-radius: 20px; border: 3px solid #4CAF50;
  text-align: center; animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0% { box-shadow: 0 0 10px #4CAF50; }
  50% { box-shadow: 0 0 30px #4CAF50; }
  100% { box-shadow: 0 0 10px #4CAF50; }
}

/* BATALLA */
#battle { 
    flex-direction: column; justify-content: center; align-items: center; 
    background: url('pikachu-pokemon.gif') center/cover no-repeat; 
}
#battle button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px #ffcb05;
}

/* FINAL */
#final { 
    justify-content: center; align-items: center; 
    background: url('Image-final.jpg') center/contain no-repeat #111; 
}
#letter {
  background: rgba(0,0,0,0.85); width: 85%; max-width: 550px; padding: 30px;
  border: 2px solid #ffcb05; border-radius: 20px; white-space: pre-wrap;
  box-shadow: 0 0 30px rgba(0,0,0,1); line-height: 1.6; font-size: 1.1rem;
  animation: letterFade 1.5s ease;
}
@keyframes letterFade {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* TRAINER */
#trainer { background: url('Trainer-card.png') center/contain no-repeat #000; }

/* BOTONES */
button { 
    padding: 15px 35px; cursor: pointer; background: #ffcb05; color: #2a75bb; 
    border: none; border-radius: 30px; font-weight: bold; letter-spacing: 1px;
    box-shadow: 0 5px 0 #c7a008; transition: 0.1s; position: relative; overflow: hidden;
}
button:active { transform: translateY(3px); box-shadow: none; }

button::after {
  content: "";
  position: absolute;
  width: 300%;
  height: 300%;
  top: -100%;
  left: -100%;
  background: radial-gradient(circle, rgba(255,255,255,0.4), transparent 60%);
  opacity: 0;
  transition: 0.4s;
}
button:hover::after {
  opacity: 1;
  top: -50%;
  left: -50%;
}

/* CONFETTI */
#confetti {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
}
</style>
</head>

<body>

<audio id="music_menu" src="cloud9.mp3" loop></audio>
<audio id="music_game" src="just_the_way.mp3" loop></audio>
<audio id="music_battle" src="gone.mp3" loop></audio>
<audio id="music_final" src="extra.mp3" loop></audio>

<!-- SFX -->
<audio id="sfx_click" src="click.mp3"></audio>
<audio id="sfx_hover" src="hover.mp3"></audio>
<audio id="sfx_success" src="success.mp3"></audio>
<audio id="sfx_error" src="error.mp3"></audio>

<div id="menu" class="screen" style="display: flex;">
  <h1 style="font-size: 3.5rem; text-shadow: 4px 4px #2a75bb; -webkit-text-stroke: 2px white; text-align: center;">¡20 años de supervivencia!</h1>
  <button onclick="showLevels()">INICIAR AVENTURA</button>
</div>

<div id="level-select" class="screen">
  <h2 style="font-size: 2.5rem; color: #ffcb05; text-shadow: 2px 2px #000;">MAPA DE NIVELES</h2>
  <div style="display: flex; flex-direction: column; gap: 10px;">
    <button id="btn-lvl1" class="level-btn" onclick="startSpecificLevel(1)">
      <img src="icono-nivel-1.gif"> NIVEL 1: Poké-Playlist
    </button>
    <button id="btn-lvl2" class="level-btn locked" onclick="startSpecificLevel(2)">
      <img src="icono-nivel-2.gif"> NIVEL 2: Batalla
    </button>
    <button id="btn-lvl3" class="level-btn locked" onclick="startSpecificLevel(3)">
      <img src="icono-nivel-3.gif"> NIVEL 3: El Mensaje
    </button>
    <button id="btn-lvl4" class="level-btn locked" onclick="startSpecificLevel(4)">
      <img src="icono-nivel-4.gif"> NIVEL 4: Trainer Card
    </button>
  </div>
</div>

<div id="playlist-screen" class="screen">
  <div class="playlist-container">
    <h2 style="color: #ffcb05; margin-bottom: 20px;">🎵 REPRODUCTOR DE YON</h2>
    <div class="song-item" onclick="playMusic('music_menu', this)">
      <span>☁️ Cloud 9</span> <small>▶️</small>
    </div>
    <div class="song-item" onclick="playMusic('music_game', this)">
      <span>✨ Just the Way</span> <small>▶️</small>
    </div>
    <div class="song-item" onclick="playMusic('music_battle', this)">
      <span>🔥 Gone, Gone, Gone</span> <small>▶️</small>
    </div>
    <div class="song-item" onclick="playMusic('music_final', this)">
      <span>🌸 Like You Do</span> <small>▶️</small>
    </div>
    <br>
    <button onclick="completeCurrentLevel()" style="background: #4CAF50; color: white; box-shadow: 0 5px 0 #2e6631;">
      LISTO PARA LA BATALLA ⚔️
    </button>
  </div>
</div>

<div id="level-transition" class="screen">
  <div class="transition-box">
    <h2 id="trans-title">¡NIVEL SUPERADO!</h2>
    <img id="transition-icon-img" src="" style="width: 100px;">
    <br>
    <button onclick="goToNextLevel()">CONTINUAR AL NEXT LEVEL <span id="transition-next-num"></span></button>
  </div>
</div>

<div id="battle" class="screen">
  <div style="background:rgba(0,0,0,0.85); padding:40px; border-radius:25px; border:3px solid #ffcb05; text-align: center;">
    <h2 style="color:#ffcb05; margin-top:0; font-size: 2rem;">¡BATALLA EMO-CIONAL!</h2>
    <p style="font-size: 1.2rem; margin-bottom: 30px;">¿Qué harás ahora?</p>
    <button onclick="choice(999)">⚡ AMAR X100PRE</button><br><br>
    <button onclick="choice(1)" style="background:#fff; color:#333;"> ¿¡DUDAR!?</button>
  </div>
</div>

<div id="final" class="screen"><div id="letter"></div></div>

<div id="trainer" class="screen">
    <button onclick="showLevels()" style="position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);">VOLVER AL MAPA</button>
</div>

<canvas id="confetti"></canvas>

<script>
let currentPlayingLevel = 1;
let highestUnlockedLevel = 1;

function hideAllScreens() {
    document.querySelectorAll('.screen').forEach(el => el.style.display = "none");
}

function showLevels() {
    hideAllScreens();
    document.getElementById("level-select").style.display = "flex";
    for(let i=1; i<=4; i++) {
        let btn = document.getElementById("btn-lvl"+i);
        if(i <= highestUnlockedLevel) {
            btn.classList.remove("locked");
            btn.disabled = false;
        }
    }
}

function startSpecificLevel(level) {
    hideAllScreens();
    currentPlayingLevel = level;
    
    if(level === 1) {
        document.getElementById("playlist-screen").style.display = "flex";
    } else if(level === 2) {
        document.getElementById("battle").style.display = "flex";
        playMusic("music_battle");
    } else if(level === 3) {
        document.getElementById("final").style.display = "flex";
        playMusic("music_final");
        triggerFinalText();
    } else if(level === 4) {
        document.getElementById("trainer").style.display = "flex";
    }
}

function completeCurrentLevel() {
    if (currentPlayingLevel >= 4) {
        showLevels();
        return;
    }
    let next = currentPlayingLevel + 1;
    highestUnlockedLevel = Math.max(highestUnlockedLevel, next);
    
    hideAllScreens();
    document.getElementById("level-transition").style.display = "flex";
    document.getElementById("transition-next-num").innerText = next;
    document.getElementById("transition-icon-img").src = "icono-nivel-" + next + ".gif";
}

function goToNextLevel() {
    startSpecificLevel(currentPlayingLevel + 1);
}

function choice(v) {
    if (v === 999) {
        completeCurrentLevel();
    } else {
        alert("¡Error! Esa opción no existe en este corazón. ❤️");
    }
}

function triggerFinalText() {
    const text = `Hola Yon... ♥\n\nFeliz cumpleaños.\n Pensaba escribirte algo súper profundo, pero ya sabes que no es lo mío, en fiin, Te amooo.\n Admiro mucho la persona increíble que eres.
    
 Gracias por estar conmigo estos últimos años aunque a veces se complique todo, te seguiré escogiendo a tí una y mil veces<3
    
 Felices 20 mi vidam. 🌸`;
    
    let i = 0;
    const box = document.getElementById("letter");
    box.textContent = "";
    
    const interval = setInterval(() => {
        box.textContent += text[i];
        i++;
        if (i >= text.length) {
            clearInterval(interval);
            setTimeout(() => completeCurrentLevel(), 6000);
        }
    }, 50);
}

function playMusic(id, element) {
    document.querySelectorAll('audio').forEach(a => { a.pause(); });
    const track = document.getElementById(id);
    if(track) {
        track.currentTime = 0;
        track.play().catch(()=>{});
    }

    if(element) {
        document.querySelectorAll('.song-item').forEach(item => item.classList.remove('active'));
        element.classList.add('active');
    }
}

/* SFX */
function playSFX(id) {
    const sfx = document.getElementById(id);
    if (sfx) {
        sfx.currentTime = 0;
        sfx.play().catch(()=>{});
    }
}

document.querySelectorAll("button").forEach(btn => {
    btn.addEventListener("mouseenter", () => playSFX("sfx_hover"));
    btn.addEventListener("click", () => playSFX("sfx_click"));
});

const originalChoice = choice;
choice = function(v) {
    if (v === 999) playSFX("sfx_success");
    else playSFX("sfx_error");
    originalChoice(v);
};

const originalComplete = completeCurrentLevel;
completeCurrentLevel = function() {
    playSFX("sfx_success");
    originalComplete();
};

/* CONFETTI */
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let confetti = [];
for (let i = 0; i < 100; i++) {
    confetti.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 6 + 2,
        d: Math.random() * 100
    });
}

function drawConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#ffcb05";
    confetti.forEach(c => {
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
        ctx.fill();
    });
    confetti.forEach(c => {
        c.y += Math.cos(c.d) + 2;
        if (c.y > canvas.height) {
            c.y = 0;
            c.x = Math.random() * canvas.width;
        }
    });
}

setInterval(drawConfetti, 30);
</script>
</body>
</html>
