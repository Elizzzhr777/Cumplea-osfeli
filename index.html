<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Aventura Pokémon para Yon</title>

<style>
body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

/* 🌟 Glow global */
.screen {
  display: none;
  width: 100vw;
  height: 100vh;
  position: absolute;
  inset: 0;
  animation: fadeIn 0.8s ease;
  box-shadow: inset 0 0 25px rgba(255,203,5,0.4), inset 0 0 60px rgba(42,117,187,0.2);
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(1.03); }
  to { opacity: 1; transform: scale(1); }
}

/* MENÚ */
#menu, #level-select {
  flex-direction: column; justify-content: center; align-items: center;
  background: url('img-fondo1.gif') center/cover no-repeat;
}

h1 {
  animation: glowText 2s infinite alternate;
}
@keyframes glowText {
  from { text-shadow: 0 0 10px #fff; }
  to { text-shadow: 0 0 25px #ffcb05, 0 0 35px #2a75bb; }
}

.level-btn {
  width: 350px;
  display: flex;
  align-items: center;
  gap: 15px;
  margin-bottom: 15px;
  background: rgba(0,0,0,0.8);
  color: #ffcb05;
  border: 2px solid #ffcb05;
  padding: 10px;
  border-radius: 15px;
  transition: 0.3s;
}
.level-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #ffcb05;
}

.locked { opacity: 0.5; filter: grayscale(100%); pointer-events: none; }

/* PLAYLIST */
#playlist-screen {
  flex-direction: column; justify-content: center; align-items: center;
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('img-fondo1.gif') center/cover no-repeat;
}

.song-item {
  background: rgba(0, 0, 0, 0.6);
  margin: 10px 0;
  padding: 15px;
  border-radius: 15px;
  cursor: pointer;
  transition: 0.2s;
}
.song-item:hover {
  transform: translateX(5px) scale(1.03);
  box-shadow: 0 0 10px #ffcb05;
}

/* TRANSICIÓN */
#level-transition {
  flex-direction: column; justify-content: center; align-items: center;
  background: rgba(0,0,0,0.9);
}
.transition-box {
  padding: 40px;
  border-radius: 20px;
  border: 3px solid #4CAF50;
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  50% { box-shadow: 0 0 30px #4CAF50; }
}

/* BATALLA */
#battle {
  flex-direction: column; justify-content: center; align-items: center;
  background: url('pikachu-pokemon.gif') center/cover no-repeat;
}

/* FINAL */
#final {
  justify-content: center;
  align-items: center;
  position: relative;
  background: #000;
}

/* 🌫️ Imagen final suave */
#final::before {
  content: "";
  position: absolute;
  inset: 0;
  background: url('Image-final.jpg') center/contain no-repeat;
  opacity: 0;
  transition: opacity 4s ease;
  z-index: 0;
}
#final.show-bg::before {
  opacity: 1;
}

/* Carta */
#letter {
  position: relative;
  z-index: 2;
  background: rgba(0,0,0,0.85);
  padding: 30px;
  border-radius: 20px;
  border: 2px solid #ffcb05;
  box-shadow: 0 0 25px #ffcb05;
}

/* TRAINER */
#trainer { background: url('Trainer-card.png') center/contain no-repeat #000; }

/* BOTONES */
button {
  padding: 15px 35px;
  background: #ffcb05;
  color: #2a75bb;
  border-radius: 30px;
  border: none;
  cursor: pointer;
  box-shadow: 0 0 10px #ffcb05;
  transition: 0.2s;
}
button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #ffcb05;
}

/* 🎉 Partículas */
#particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 1;
}
</style>
</head>

<body>

<audio id="music_menu" src="cloud9.mp3" loop></audio>
<audio id="music_game" src="just_the_way.mp3" loop></audio>
<audio id="music_battle" src="gone.mp3" loop></audio>
<audio id="music_final" src="extra.mp3" loop></audio>

<audio id="click" src="click.mp3"></audio>
<audio id="hover" src="hover.mp3"></audio>
<audio id="success" src="success.mp3"></audio>
<audio id="error" src="error.mp3"></audio>

<div id="menu" class="screen" style="display:flex;">
<h1>¡20 años de supervivencia!</h1>
<button onclick="showLevels()">INICIAR AVENTURA</button>
</div>

<div id="level-select" class="screen">
<h2>MAPA DE NIVELES</h2>
<button id="btn-lvl1" onclick="startSpecificLevel(1)">NIVEL 1</button>
<button id="btn-lvl2" class="locked" onclick="startSpecificLevel(2)">NIVEL 2</button>
<button id="btn-lvl3" class="locked" onclick="startSpecificLevel(3)">NIVEL 3</button>
<button id="btn-lvl4" class="locked" onclick="startSpecificLevel(4)">NIVEL 4</button>
</div>

<div id="playlist-screen" class="screen">
<button onclick="completeCurrentLevel()">LISTO</button>
</div>

<div id="level-transition" class="screen">
<button onclick="goToNextLevel()">CONTINUAR</button>
</div>

<div id="battle" class="screen">
<button onclick="choice(999)">AMAR</button>
<button onclick="choice(1)">DUDAR</button>
</div>

<div id="final" class="screen">
<canvas id="particles"></canvas>
<div id="letter"></div>
</div>

<div id="trainer" class="screen">
<button onclick="showLevels()">VOLVER</button>
</div>

<script>
let currentPlayingLevel = 1;
let highestUnlockedLevel = 1;

function hideAllScreens() {
 document.querySelectorAll('.screen').forEach(el => el.style.display="none");
}

function showLevels() {
 hideAllScreens();
 document.getElementById("level-select").style.display="flex";
}

function startSpecificLevel(level) {
 hideAllScreens();
 currentPlayingLevel = level;

 if(level===3){
  const final = document.getElementById("final");
  final.style.display="flex";
  setTimeout(()=>final.classList.add("show-bg"),500);
  triggerFinalText();
  startParticles();
 }
}

function completeCurrentLevel(){
 highestUnlockedLevel++;
}

function goToNextLevel(){}

function choice(v){
 if(v===999){
  play("success");
  completeCurrentLevel();
 } else {
  play("error");
 }
}

/* CARTA */
function triggerFinalText(){
 const text=`Hola Yon... ♥

Feliz cumpleaños...`;
 let i=0;
 const box=document.getElementById("letter");
 const interval=setInterval(()=>{
  box.textContent+=text[i];
  i++;
  if(i>=text.length) clearInterval(interval);
 },40);
}

/* SONIDOS */
function play(id){
 const a=document.getElementById(id);
 if(a){ a.currentTime=0; a.play().catch(()=>{}); }
}

document.querySelectorAll("button").forEach(b=>{
 b.addEventListener("mouseenter",()=>play("hover"));
 b.addEventListener("click",()=>play("click"));
});

/* PARTÍCULAS SOLO FINAL */
function startParticles(){
 const canvas=document.getElementById("particles");
 const ctx=canvas.getContext("2d");
 canvas.width=window.innerWidth;
 canvas.height=window.innerHeight;

 let p=[];
 for(let i=0;i<80;i++){
  p.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*3+1});
 }

 function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#ffcb05";
  p.forEach(e=>{
   ctx.beginPath();
   ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
   ctx.fill();
   e.y+=1;
   if(e.y>canvas.height) e.y=0;
  });
 }
 setInterval(draw,30);
}
</script>

</body>
</html>
