<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Aventura Pokémon para Yon</title>
<style>
body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
.screen { display: none; width: 100vw; height: 100vh; position: absolute; inset: 0; animation: screenFade 0.6s ease; }

/* ===== NUEVAS ANIMACIONES ===== */
@keyframes screenFade {
  from { opacity: 0; transform: scale(0.98); }
  to   { opacity: 1; transform: scale(1); }
}
@keyframes titleGlow {
  0%,100% { text-shadow: 4px 4px #2a75bb, 0 0 20px rgba(255,203,5,0.6); }
  50%     { text-shadow: 4px 4px #2a75bb, 0 0 40px rgba(255,203,5,1), 0 0 60px rgba(42,117,187,0.8); }
}
@keyframes floaty {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-8px); }
}
@keyframes pulseBorder {
  0%,100% { box-shadow: 0 0 15px rgba(255,203,5,0.4); }
  50%     { box-shadow: 0 0 35px rgba(255,203,5,0.9), 0 0 55px rgba(42,117,187,0.5); }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25%     { transform: translateX(-6px) rotate(-1deg); }
  75%     { transform: translateX(6px) rotate(1deg); }
}
@keyframes letterAppear {
  from { opacity: 0; transform: translateY(20px) scale(0.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes bgFinalReveal {
  from { background-color: #000; }
  to   { background-color: #111; }
}

/* MENÚ Y MAPA */
#menu, #level-select {
  flex-direction: column; justify-content: center; align-items: center;
  background: url('img-fondo1.gif') center/cover no-repeat;
}
#menu h1 { animation: titleGlow 2.5s ease-in-out infinite; }

.level-btn {
  width: 350px; display: flex; align-items: center; justify-content: flex-start; gap: 15px;
  margin-bottom: 15px; background: rgba(0,0,0,0.8); color: #ffcb05;
  border: 2px solid #ffcb05; padding: 10px; border-radius: 15px; transition: 0.3s;
}
.level-btn:not(.locked):hover {
  transform: translateX(10px) scale(1.04);
  box-shadow: 0 0 25px rgba(255,203,5,0.8);
  background: rgba(42,117,187,0.6);
}
.level-btn img { width: 40px; height: 40px; object-fit: contain; animation: floaty 2.4s ease-in-out infinite; }
.locked { opacity: 0.5; filter: grayscale(100%); cursor: not-allowed; pointer-events: none; }

/* 🎵 PLAYLIST (NIVEL 1) */
#playlist-screen {
  flex-direction: column; justify-content: center; align-items: center;
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('img-fondo1.gif') center/cover no-repeat;
}
.playlist-container {
  background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
  padding: 30px; border-radius: 25px; border: 3px solid #ffcb05;
  width: 80%; max-width: 450px; text-align: center;
  animation: pulseBorder 3s ease-in-out infinite, letterAppear 0.8s ease;
}
.song-item {
  background: rgba(0, 0, 0, 0.6); margin: 10px 0; padding: 15px;
  border-radius: 15px; cursor: pointer; border: 1px solid transparent;
  transition: 0.25s; display: flex; align-items: center; justify-content: space-between;
}
.song-item:hover { border-color: #ffcb05; background: rgba(42, 117, 187, 0.4); transform: translateX(8px); }
.song-item.active {
  background: #2a75bb; border-color: #fff;
  box-shadow: 0 0 20px #2a75bb, inset 0 0 15px rgba(255,255,255,0.2);
  animation: shake 0.6s ease;
}

/* TRANSICIÓN */
#level-transition {
  flex-direction: column; justify-content: center; align-items: center;
  background: rgba(0,0,0,0.9); z-index: 200;
}
.transition-box {
  background: #111; padding: 40px; border-radius: 20px; border: 3px solid #4CAF50;
  text-align: center; box-shadow: 0 0 20px #4CAF50;
  animation: letterAppear 0.6s ease, pulseBorder 2.5s ease-in-out infinite;
}
.transition-icon { animation: floaty 1.8s ease-in-out infinite; filter: drop-shadow(0 0 10px #4CAF50); }

/* BATALLA (NIVEL 2) */
#battle {
    flex-direction: column; justify-content: center; align-items: center;
    background: url('pikachu-pokemon.gif') center/cover no-repeat;
}
#battle > div { animation: letterAppear 0.7s ease, pulseBorder 3s ease-in-out infinite; }

/* MENSAJE (NIVEL 3) */
#final {
    justify-content: center; align-items: center; position: relative;
    background: #111;
}
/* Capa de imagen final que aparece sutilmente */
#final-bg {
    position: absolute; inset: 0;
    background: url('Image-final.jpg') center/contain no-repeat #111;
    opacity: 0;
    transition: opacity 0.8s ease;
    pointer-events: none;
}
#final-particles {
    position: absolute; inset: 0; pointer-events: none; z-index: 2;
}
#letter {
  position: relative; z-index: 3;
  background: rgba(0,0,0,0.85); width: 85%; max-width: 550px; padding: 30px;
  border: 2px solid #ffcb05; border-radius: 20px; white-space: pre-wrap;
  box-shadow: 0 0 30px rgba(0,0,0,1); line-height: 1.6; font-size: 1.1rem;
  animation: letterAppear 1s ease, pulseBorder 4s ease-in-out infinite;
}

/* TRAINER CARD (NIVEL 4) */
#trainer { background: url('Trainer-card.png') center/contain no-repeat #000; }
#trainer { animation: screenFade 1s ease; }

button {
    padding: 15px 35px; cursor: pointer; background: #ffcb05; color: #2a75bb;
    border: none; border-radius: 30px; font-weight: bold; letter-spacing: 1px;
    box-shadow: 0 5px 0 #c7a008; transition: 0.15s;
}
button:hover { transform: translateY(-2px) scale(1.05); box-shadow: 0 7px 0 #c7a008, 0 0 20px rgba(255,203,5,0.7); }
button:active { transform: translateY(3px); box-shadow: none; }
</style>
</head>
<body>
<audio id="music_menu" src="cloud9.mp3" loop></audio>
<audio id="music_game" src="just_the_way.mp3" loop></audio>
<audio id="music_battle" src="gone.mp3" loop></audio>
<audio id="music_final" src="extra.mp3" loop></audio>
<div id="menu" class="screen" style="display: flex;">
  <h1 style="font-size: 3.5rem; text-shadow: 4px 4px #2a75bb; -webkit-text-stroke: 2px white; text-align: center;">¡20 años de supervivencia!</h1>
  <button onclick="showLevels()">INICIAR AVENTURA</button>
</div>
<div id="level-select" class="screen">
  <h2 style="font-size: 2.5rem; color: #ffcb05; text-shadow: 2px 2px #000;">MAPA DE NIVELES</h2>
  <div style="display: flex; flex-direction: column; gap: 10px;">
    <button id="btn-lvl1" class="level-btn" onclick="startSpecificLevel(1)">
      <img src="icono-nivel-1.gif"> NIVEL 1: Poké-Playlist
    </button>
    <button id="btn-lvl2" class="level-btn locked" onclick="startSpecificLevel(2)">
      <img src="icono-nivel-2.gif"> NIVEL 2: Batalla
    </button>
    <button id="btn-lvl3" class="level-btn locked" onclick="startSpecificLevel(3)">
      <img src="icono-nivel-3.gif"> NIVEL 3: El Mensaje
    </button>
    <button id="btn-lvl4" class="level-btn locked" onclick="startSpecificLevel(4)">
      <img src="icono-nivel-4.gif"> NIVEL 4: Trainer Card
    </button>
  </div>
</div>
<div id="playlist-screen" class="screen">
  <div class="playlist-container">
    <h2 style="color: #ffcb05; margin-bottom: 20px;">🎵 REPRODUCTOR DE YON</h2>
    <div class="song-item" onclick="playMusic('music_menu', this)">
      <span>☁️ Cloud 9</span> <small>▶️</small>
    </div>
    <div class="song-item" onclick="playMusic('music_game', this)">
      <span>✨ Just the Way</span> <small>▶️</small>
    </div>
    <div class="song-item" onclick="playMusic('music_battle', this)">
      <span>🔥 Gone, Gone, Gone</span> <small>▶️</small>
    </div>
    <div class="song-item" onclick="playMusic('music_final', this)">
      <span>🌸 Like You Do</span> <small>▶️</small>
    </div>
    <br>
    <button onclick="completeCurrentLevel()" style="background: #4CAF50; color: white; box-shadow: 0 5px 0 #2e6631;">
      LISTO PARA LA BATALLA ⚔️
    </button>
  </div>
</div>
<div id="level-transition" class="screen">
  <div class="transition-box">
    <h2 id="trans-title">¡NIVEL SUPERADO!</h2>
    <img id="transition-icon-img" class="transition-icon" src="" style="width: 100px;">
    <br>
    <button onclick="goToNextLevel()">CONTINUAR AL NEXT LEVEL <span id="transition-next-num"></span></button>
  </div>
</div>
<div id="battle" class="screen">
  <div style="background:rgba(0,0,0,0.85); padding:40px; border-radius:25px; border:3px solid #ffcb05; text-align: center;">
    <h2 style="color:#ffcb05; margin-top:0; font-size: 2rem;">¡BATALLA EMO-CIONAL!</h2>
    <p style="font-size: 1.2rem; margin-bottom: 30px;">¿Qué harás ahora?</p>
    <button onclick="choice(999)">⚡ AMAR X100PRE</button><br><br>
    <button onclick="choice(1)" style="background:#fff; color:#333;"> ¿¡DUDAR!?</button>
  </div>
</div>
<div id="final" class="screen">
  <div id="final-bg"></div>
  <canvas id="final-particles"></canvas>
  <div id="letter"></div>
</div>
<div id="trainer" class="screen">
    <button onclick="showLevels()" style="position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);">VOLVER AL MAPA</button>
</div>
<script>
let currentPlayingLevel = 1;
let highestUnlockedLevel = 1;

/* ===== EFECTO DE SONIDO PARA BOTONES (WebAudio, sin recursos externos) ===== */
let _audioCtx = null;
function _ctx(){ if(!_audioCtx){ try{ _audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return _audioCtx; }
function clickSound(type){
    const ctx = _ctx(); if(!ctx) return;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    if(type === 'hover'){
        o.type = 'sine'; o.frequency.value = 880;
        g.gain.value = 0.04;
        o.start(); o.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime+0.08);
        g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.1);
        o.stop(ctx.currentTime+0.11);
    } else {
        o.type = 'square'; o.frequency.value = 520;
        g.gain.value = 0.08;
        o.start();
        o.frequency.exponentialRampToValueAtTime(880, ctx.currentTime+0.08);
        g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.18);
        o.stop(ctx.currentTime+0.2);
    }
}
document.addEventListener('click', (e)=>{
    if(e.target.closest('button, .song-item')) clickSound('click');
}, true);
document.addEventListener('mouseover', (e)=>{
    if(e.target.closest('button:not(.locked), .song-item')) clickSound('hover');
}, true);

function hideAllScreens() {
    document.querySelectorAll('.screen').forEach(el => el.style.display = "none");
}
function showLevels() {
    hideAllScreens();
    document.getElementById("level-select").style.display = "flex";
    for(let i=1; i<=4; i++) {
        let btn = document.getElementById("btn-lvl"+i);
        if(i <= highestUnlockedLevel) {
            btn.classList.remove("locked");
            btn.disabled = false;
        }
    }
}
function startSpecificLevel(level) {
    hideAllScreens();
    currentPlayingLevel = level;

    if(level === 1) {
        document.getElementById("playlist-screen").style.display = "flex";
    } else if(level === 2) {
        document.getElementById("battle").style.display = "flex";
        playMusic("music_battle");
    } else if(level === 3) {
        document.getElementById("final").style.display = "flex";
        playMusic("music_final");
        triggerFinalText();
        startFinalParticles();
    } else if(level === 4) {
        document.getElementById("trainer").style.display = "flex";
    }
}
function completeCurrentLevel() {
    if (currentPlayingLevel >= 4) {
        showLevels();
        return;
    }
    let next = currentPlayingLevel + 1;
    highestUnlockedLevel = Math.max(highestUnlockedLevel, next);

    hideAllScreens();
    document.getElementById("level-transition").style.display = "flex";
    document.getElementById("transition-next-num").innerText = next;
    document.getElementById("transition-icon-img").src = "icono-nivel-" + next + ".gif";
}
function goToNextLevel() {
    startSpecificLevel(currentPlayingLevel + 1);
}
function choice(v) {
    if (v === 999) {
        completeCurrentLevel();
    } else {
        // pequeño shake en pantalla de batalla
        const b = document.getElementById('battle').firstElementChild;
        if(b){ b.style.animation='none'; void b.offsetWidth; b.style.animation='shake 0.5s ease'; }
        alert("¡Error! Esa opción no existe en este corazón. ❤️");
    }
}
function triggerFinalText() {
    const text = `Hola Yon... ♥\n\nFeliz cumpleaños.\n Pensaba escribirte algo súper profundo, pero ya sabes que no es lo mío, en fiin, Te amooo.\n Admiro mucho la persona increíble que eres.
    \n Gracias por estar conmigo estos últimos años aunque a veces se complique todo, te seguiré escogiendo a tí una y mil veces<3
    \n Felices 20 mi vidam. 🌸`;

    let i = 0;
    const box = document.getElementById("letter");
    const bg  = document.getElementById("final-bg");
    box.textContent = "";
    if(bg) bg.style.opacity = 0;

    const interval = setInterval(() => {
        box.textContent += text[i];
        i++;
        // La imagen final aparece progresivamente con la carta
        if(bg){
            const p = Math.min(1, i / text.length);
            bg.style.opacity = (p * 0.85).toFixed(3);
        }
        if (i >= text.length) {
            clearInterval(interval);
            setTimeout(() => completeCurrentLevel(), 6000);
        }
    }, 50);
}

/* ===== PARTÍCULAS SOBRE LA CARTA (corazones + chispas) ===== */
let _particlesRAF = null;
function startFinalParticles(){
    const cv = document.getElementById('final-particles');
    if(!cv) return;
    const ctx = cv.getContext('2d');
    const resize = ()=>{ cv.width = window.innerWidth; cv.height = window.innerHeight; };
    resize(); window.addEventListener('resize', resize);

    const parts = [];
    const colors = ['#ffcb05','#ff5fa2','#ffffff','#2a75bb','#ff8ec6'];
    for(let i=0;i<60;i++){
        parts.push({
            x: Math.random()*cv.width,
            y: Math.random()*cv.height + cv.height,
            r: 2 + Math.random()*4,
            vy: -0.3 - Math.random()*0.9,
            vx: (Math.random()-0.5)*0.4,
            c: colors[(Math.random()*colors.length)|0],
            heart: Math.random() < 0.35,
            a: 0.4 + Math.random()*0.6,
            t: Math.random()*Math.PI*2
        });
    }
    function drawHeart(x,y,s,color,alpha){
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(x, y + s*0.3);
        ctx.bezierCurveTo(x, y, x - s, y, x - s, y + s*0.3);
        ctx.bezierCurveTo(x - s, y + s*0.7, x, y + s*0.9, x, y + s*1.2);
        ctx.bezierCurveTo(x, y + s*0.9, x + s, y + s*0.7, x + s, y + s*0.3);
        ctx.bezierCurveTo(x + s, y, x, y, x, y + s*0.3);
        ctx.fill();
        ctx.restore();
    }
    function frame(){
        ctx.clearRect(0,0,cv.width,cv.height);
        for(const p of parts){
            p.t += 0.03;
            p.x += p.vx + Math.sin(p.t)*0.3;
            p.y += p.vy;
            if(p.y < -20){ p.y = cv.height + 10; p.x = Math.random()*cv.width; }
            if(p.heart){
                drawHeart(p.x, p.y, p.r*1.2, p.c, p.a);
            } else {
                ctx.save();
                ctx.globalAlpha = p.a;
                ctx.fillStyle = p.c;
                ctx.shadowColor = p.c; ctx.shadowBlur = 8;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }
        }
        _particlesRAF = requestAnimationFrame(frame);
    }
    if(_particlesRAF) cancelAnimationFrame(_particlesRAF);
    frame();
}

function playMusic(id, element) {
    document.querySelectorAll('audio').forEach(a => { a.pause(); });
    const track = document.getElementById(id);
    if(track) {
        track.currentTime = 0;
        track.play().catch(()=>{});
    }
    if(element) {
        document.querySelectorAll('.song-item').forEach(item => item.classList.remove('active'));
        element.classList.add('active');
    }
}
</script>
</body>
</html>
