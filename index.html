<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pokémon Yon - Procedural Toon Edition</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
.screen { display: none; width: 100vw; height: 100vh; position: absolute; inset: 0; }

/* MENU */
#menu {
  flex-direction: column; justify-content: center; align-items: center;
  background: url('img-fondo1.gif') center/cover no-repeat;
}

/* GAME UI */
#game-container { width: 100%; height: 100%; cursor: none; }
#hud { 
    position: absolute; top: 20px; left: 20px; z-index: 100;
    background: rgba(0,0,0,0.8); padding: 12px 25px; border-radius: 50px;
    border: 2px solid #ffcb05; font-weight: bold; font-size: 14px;
}

/* BATTLE */
#battle {
  flex-direction: column; justify-content: center; align-items: center;
  background: url('pikachu-pokemon.gif') center/cover no-repeat;
}

/* FINAL SCENE - Collage Ajustado */
#final {
  justify-content: center; align-items: center;
  background: url('Image-final.jpg') center/contain no-repeat #111;
}
#letter {
  background: rgba(0,0,0,0.85); width: 85%; max-width: 550px; padding: 30px;
  border: 2px solid #ffcb05; border-radius: 20px; white-space: pre-wrap;
  box-shadow: 0 0 30px rgba(0,0,0,1); line-height: 1.6;
}

/* TRAINER CARD */
#trainer { background: url('Trainer-card.png') center/contain no-repeat #000; }

button { 
    padding: 15px 35px; cursor: pointer; background: #ffcb05; color: #2a75bb; 
    border: none; border-radius: 30px; font-weight: bold; letter-spacing: 1px;
    box-shadow: 0 5px 0 #c7a008; transition: 0.1s;
}
button:active { transform: translateY(3px); box-shadow: none; }
</style>
</head>

<body>

<audio id="music_menu" src="cloud9.mp3" loop></audio>
<audio id="music_game" src="just_the_way.mp3" loop></audio>
<audio id="music_battle" src="gone.mp3" loop></audio>
<audio id="music_final" src="extra.mp3" loop></audio>

<div id="menu" class="screen" style="display: flex;">
  <h1 style="font-size: 3.5rem; text-shadow: 4px 4px #2a75bb; -webkit-text-stroke: 2px white;">POKÉMON YON</h1>
  <button onclick="startGame()">NUEVA AVENTURA</button>
</div>

<div id="game" class="screen">
  <div id="hud">✨ AMOR: <span id="love">0</span></div>
  <div id="game-container"></div>
</div>

<div id="battle" class="screen">
  <div style="background:rgba(0,0,0,0.85); padding:30px; border-radius:25px; border:3px solid #ffcb05;">
    <h2 style="color:#ffcb05; margin-top:0;">¡BATALLA EMO-CIONAL!</h2>
    <button onclick="choice(999)">⚡ AMAR POR SIEMPRE</button><br><br>
    <button onclick="choice(1)" style="background:#fff; color:#333;">💛 CONFIAR</button>
  </div>
</div>

<div id="final" class="screen"><div id="letter"></div></div>
<div id="trainer" class="screen"></div>

<script>
let scene, camera, renderer, yonSprite, pikaSprite;
let mode = "menu", love = 0, moveForward = false;

/* 🛠️ INGENIERÍA DE TEXTURAS: Generador de Suelo Toon */
function createToonGrassTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 512; canvas.height = 512;
    const ctx = canvas.getContext('2d');

    // Base Verde Pokémon (Flat)
    ctx.fillStyle = '#4CAF50';
    ctx.fillRect(0, 0, 512, 512);

    // Añadir briznas de hierba estilizadas
    ctx.fillStyle = '#388E3C';
    for(let i=0; i<150; i++) {
        let x = Math.random() * 512;
        let y = Math.random() * 512;
        ctx.fillRect(x, y, 10, 4); // Pequeños rectángulos para el Toon look
    }

    // Añadir flores amarillas minimalistas
    ctx.fillStyle = '#FFEB3B';
    for(let i=0; i<40; i++) {
        ctx.beginPath();
        ctx.arc(Math.random()*512, Math.random()*512, 3, 0, Math.PI*2);
        ctx.fill();
    }

    const texture = new THREE.CanvasTexture(canvas);
    texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
    texture.repeat.set(20, 20); // Repetir para que parezca un mundo infinito
    return texture;
}

function initEngine() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); // Cielo Azul Celeste

    camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('game-container').appendChild(renderer.domElement);

    // Suelo Procedural
    const groundGeo = new THREE.PlaneGeometry(200, 200);
    const groundMat = new THREE.MeshToonMaterial({ map: createToonGrassTexture() });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // Iluminación Toon
    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(5, 10, 7);
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));

    // Carga de Personajes con Cel-Shaded Outline simulado
    const loader = new THREE.TextureLoader();
    const materialYon = new THREE.SpriteMaterial({ map: loader.load('Yon.png'), alphaTest: 0.5 });
    yonSprite = new THREE.Sprite(materialYon);
    yonSprite.scale.set(2, 2, 1);
    yonSprite.position.y = 1;
    scene.add(yonSprite);

    const materialPika = new THREE.SpriteMaterial({ map: loader.load('pikachu.png'), alphaTest: 0.5 });
    pikaSprite = new THREE.Sprite(materialPika);
    pikaSprite.scale.set(1.2, 1.2, 1);
    pikaSprite.position.y = 0.6;
    scene.add(pikaSprite);

    camera.position.set(0, 3, 7);
    camera.lookAt(yonSprite.position);

    animate();
}

function animate() {
    if (mode !== "game") return;
    requestAnimationFrame(animate);
    const time = Date.now() * 0.005;

    // Animación Idle (Respiración/Balanceo)
    yonSprite.scale.y = 2 + Math.sin(time * 0.8) * 0.05;
    pikaSprite.position.y = 0.6 + Math.cos(time * 1.2) * 0.05;

    if (moveForward) {
        yonSprite.position.z -= 0.12;
        yonSprite.rotation.z = Math.sin(time * 3) * 0.1; // Ciclo de caminata
        camera.position.z -= 0.12;
        if(Math.random() < 0.008) startBattle();
    }

    // Suavizado de seguimiento de Pikachu
    pikaSprite.position.lerp(new THREE.Vector3(yonSprite.position.x + 1.3, pikaSprite.position.y, yonSprite.position.z + 0.9), 0.15);

    renderer.render(scene, camera);
}

function startGame() {
    document.getElementById("menu").style.display = "none";
    document.getElementById("game").style.display = "block";
    mode = "game";
    playMusic("music_game");
    if (!scene) initEngine();
}

function startBattle() {
    mode = "battle";
    document.getElementById("battle").style.display = "flex";
    playMusic("music_battle");
}

function choice(v) {
    if (v === 999) triggerFinal();
    else {
        love += v;
        document.getElementById("love").innerText = love;
        document.getElementById("battle").style.display = "none";
        mode = "game";
        playMusic("music_game");
        animate();
    }
}

function triggerFinal() {
    mode = "final";
    document.getElementById("battle").style.display = "none";
    document.getElementById("final").style.display = "flex";
    playMusic("music_final");
    
    const text = `Hola Yon... ♥\n\nFeliz cumpleaños.\n\nTe amooo.\nAdmiro la persona increíble que eres.\nAún cuando todo se pone difícil...\nyo sigo eligiéndote.\n\nFelicidades, mi Yon. 🌸`;
    let i = 0;
    const box = document.getElementById("letter");
    const interval = setInterval(() => {
        box.textContent += text[i]; i++;
        if (i >= text.length) {
            clearInterval(interval);
            setTimeout(() => {
                document.getElementById("final").style.display = "none";
                document.getElementById("trainer").style.display = "flex";
            }, 6000);
        }
    }, 50);
}

function playMusic(id) {
    document.querySelectorAll('audio').forEach(a => { a.pause(); a.currentTime = 0; });
    document.getElementById(id).play().catch(()=>{});
}

window.addEventListener('keydown', e => { if (e.key === "ArrowUp") moveForward = true; });
window.addEventListener('keyup', e => { if (e.key === "ArrowUp") moveForward = false; });
window.addEventListener('click', () => { if(mode==="menu") playMusic("music_menu") }, {once:true});
</script>
</body>
</html>
