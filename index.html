<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pokémon Yon GBA</title>

<style>
body{ margin:0; background:#000; overflow:hidden; font-family:monospace; }
.screen{display:none; position:absolute; inset:0}
.screen.active{display:block}

/* 1. MENU (GIF) */
#menu{
  display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; color:white;
  background: url('img-fondo1.gif') center/cover no-repeat;
}

#menu h1 { background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 8px; }

/* 2. GAME MAP (JPG) */
#game{
  position:relative; width:100vw; height:100vh;
  background: url('img-fondo1.jpg') center/cover no-repeat;
}

/* PLAYER */
.player{
  width:48px; height:48px; position:absolute;
  background-size:contain; background-repeat:no-repeat;
}
#yon{background-image:url('Yon.png')}
#pika{background-image:url('pikachu.png')}

/* 3. BATTLE (Pikachu GIF) */
#battle{
  display:flex; justify-content:center; align-items:center; flex-direction:column; height:100vh; color:white;
  background: url('pikachu-pokemon.gif') center/cover no-repeat;
}

#battle h2 { background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px;}

/* 4. FINAL SCENE (Carta con fondo Image-final.jpg) */
#final{
  display:flex; justify-content:center; align-items:center; height:100vh;
  background: url('Image-final.jpg') center/cover no-repeat; 
}

#letter{
  background: rgba(0,0,0,0.8); /* Fondo oscuro semitransparente para leer bien */
  width: 90%;
  max-width: 500px;
  padding: 40px;
  box-sizing: border-box;
  color: #fff; /* Texto blanco */
  font-size: 16px;
  white-space: pre-line;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(0,0,0,0.8);
}

/* 5. TRAINER CARD (Pantalla Final) */
#trainer{
  display:none; justify-content:center; align-items:center; height:100vh;
  background: url('Trainer-card.png') center/contain no-repeat #000;
}
#trainer.active { display:flex; }

#hud{ position:absolute; top:10px; left:10px; color:white; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 5px; }
button { padding: 10px 20px; cursor: pointer; font-family: monospace; background: #000; color: #fff; border: 2px solid #fff; margin: 5px; border-radius: 5px; }
button:hover { background: #333; }
</style>
</head>

<body>

<audio id="music_menu" src="cloud9.mp3" loop></audio>
<audio id="music_game" src="just_the_way.mp3" loop></audio>
<audio id="music_battle" src="gone.mp3" loop></audio>
<audio id="music_final" src="extra.mp3" loop></audio>

<div id="menu" class="screen active">
  <h1>POKÉMON YON</h1>
  <button onclick="startGame()">Nueva Aventura</button>
</div>

<div id="game" class="screen">
  <div id="yon" class="player"></div>
  <div id="pika" class="player"></div>
  <div id="hud">Amor: <span id="love">0</span></div>
</div>

<div id="battle" class="screen">
  <h2>¡Batalla emo-cional!</h2>
  <button onclick="choice(999)">⚡ Amar x100pre</button>
  <button onclick="choice(1)">💛 Confiar</button>
  <button onclick="choice(-1)">💔 Dudar?</button>
</div>

<div id="final" class="screen">
  <div id="letter"></div>
</div>

<div id="trainer" class="screen"></div>

<script>
const TILE = 48;
let mode="menu", love=0, grid = {x:4,y:2}, moving=false, trail=[];
const yon = document.getElementById("yon"), pika = document.getElementById("pika");

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function playMusic(id) {
    document.querySelectorAll('audio').forEach(a => { a.pause(); a.currentTime = 0; });
    document.getElementById(id).play().catch(e => {});
}

function startGame(){
  mode="game";
  show("game");
  playMusic("music_game");
  update();
}

document.addEventListener("keydown",e=>{
  if(mode!=="game" || moving) return;
  let dx=0, dy=0;
  if(e.key==="ArrowUp") dy=-1; if(e.key==="ArrowDown") dy=1;
  if(e.key==="ArrowLeft") dx=-1; if(e.key==="ArrowRight") dx=1;
  if(dx!==0 || dy!==0) move(dx,dy);
});

function move(dx,dy){
  moving=true; grid.x+=dx; grid.y+=dy;
  animateMove(()=>{
    if(grid.y > 6 && Math.random()<0.3) startBattle();
    moving=false;
  });
}

function animateMove(cb){
  let startX=yon.offsetLeft, startY=yon.offsetTop, endX=grid.x*TILE, endY=grid.y*TILE, t=0;
  function step(){
    t+=0.1;
    yon.style.left = (startX + (endX-startX)*t)+"px";
    yon.style.top = (startY + (endY-startY)*t)+"px";
    let target = trail[trail.length-1] || {x:startX, y:startY};
    pika.style.left = (parseFloat(pika.style.left||startX) + (target.x - parseFloat(pika.style.left||startX))*0.2)+"px";
    pika.style.top = (parseFloat(pika.style.top||startY) + (target.y - parseFloat(pika.style.top||startY))*0.2)+"px";
    if(t<1) requestAnimationFrame(step);
    else { trail.push({x:endX,y:endY}); if(trail.length>5) trail.shift(); if(cb) cb(); }
  }
  step();
}

function startBattle(){ mode="battle"; show("battle"); playMusic("music_battle"); }

function choice(v){
  // Si presiona "Amar x100pre" (valor 999), vamos directo a la carta
  if(v === 999) {
    finalScene();
  } else {
    // Si presiona otra cosa, suma puntos y regresa al mapa
    love+=v;
    document.getElementById("love").textContent=love;
    mode="game"; show("game"); playMusic("music_game");
  }
}

function finalScene(){
  mode="final";
  show("final");
  playMusic("music_final");
  
  const text = `Hola Yon... ♥\n\nFeliz cumpleaños.\n\nPensé en escribirte algo súper profundo...\npero ya sabes que lo mío no es ser cursi.\n\nAsí que bueno, lo intentaré jiji\n\nTe amooo.\n\nPero, sobre todo...\nte respeto.\ny te admiro muchísimo.\n\nAdmiro tu capacidad para soportarme kjjsj...\ny la persona increíble que eres.\n\nAún cuando todo se pone difícil...\nyo sigo eligiéndote.\n\nDai. 🌸`;
  let i = 0;
  const el = document.getElementById("letter");
  el.textContent = "";
  
  const typing = setInterval(() => {
    el.textContent += text[i];
    i++;
    if(i >= text.length) {
      clearInterval(typing);
      
      // Una vez que termina la carta, espera 5 segundos y muestra la Trainer Card
      setTimeout(() => {
        mode="trainer";
        show("trainer");
      }, 5000); 
    }
  }, 50); // Velocidad de las letras
}

function update(){
  yon.style.left = grid.x*TILE+"px"; yon.style.top = grid.y*TILE+"px";
  pika.style.left = (grid.x*TILE-48)+"px"; pika.style.top = (grid.y*TILE)+"px";
}

window.addEventListener('click', () => { if(mode === "menu") playMusic("music_menu"); }, {once: true});
</script>
</body>
</html>
