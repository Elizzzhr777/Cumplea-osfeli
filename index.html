<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pokémon Yon - Crimson & Gold Edition</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
/* 🎨 PALETA DE COLORES: NEGRO, ROJO, AMARILLO, VERDE */
:root {
    --primary-yellow: #FFCB05;
    --dark-bg: #000000;
    --action-green: #4CAF50;
    --emotional-red: #FF1744;
    --border-black: #000000;
}

body { margin: 0; background: var(--dark-bg); color: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
.screen { display: none; width: 100vw; height: 100vh; position: absolute; inset: 0; }

/* MENU */
#menu {
  flex-direction: column; justify-content: center; align-items: center;
  background: url('img-fondo1.gif') center/cover no-repeat;
}

#menu h1 {
    font-size: 4rem;
    color: var(--primary-yellow);
    text-shadow: 4px 4px 0px var(--border-black);
    -webkit-text-stroke: 1.5px #fff;
    margin-bottom: 30px;
}

/* GAME UI */
#game-container { width: 100%; height: 100%; cursor: none; }
#hud { 
    position: absolute; top: 20px; left: 20px; z-index: 100;
    background: var(--dark-bg); 
    padding: 12px 25px; border-radius: 10px;
    border: 3px solid var(--primary-yellow); 
    font-weight: bold; font-size: 18px;
    color: var(--primary-yellow);
    box-shadow: 4px 4px 0px rgba(0,0,0,0.5);
}

/* BATTLE */
#battle {
  flex-direction: column; justify-content: center; align-items: center;
  background: url('pikachu-pokemon.gif') center/cover no-repeat;
}

.battle-box {
    background: rgba(0,0,0,0.9); 
    padding: 40px; border-radius: 15px; 
    border: 4px solid var(--primary-yellow);
    text-align: center;
}

.battle-box h2 {
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 30px;
    -webkit-text-stroke: 1px var(--emotional-red);
}

/* FINAL SCENE */
#final {
  justify-content: center; align-items: center;
  background: url('Image-final.jpg') center/contain no-repeat #000;
}
#letter {
  background: rgba(0,0,0,0.9); 
  width: 85%; max-width: 550px; padding: 35px;
  border: 4px solid var(--emotional-red); 
  border-radius: 5px; white-space: pre-wrap;
  box-shadow: 0 0 40px var(--emotional-red); 
  line-height: 1.6;
  color: #fff;
  font-size: 1.1rem;
}

/* TRAINER CARD */
#trainer { background: url('Trainer-card.png') center/contain no-repeat #000; }

/* 🕹️ BOTONES ESTILIZADOS */
button { 
    padding: 18px 40px; cursor: pointer; 
    font-family: inherit; font-size: 1.2rem; font-weight: bold;
    text-transform: uppercase;
    transition: 0.1s;
    border: 3px solid var(--border-black);
    border-radius: 8px;
}

.btn-start { background: var(--action-green); color: #fff; box-shadow: 5px 5px 0px #1B5E20; }
.btn-love { background: var(--emotional-red); color: #fff; box-shadow: 5px 5px 0px #B71C1C; }
.btn-trust { background: var(--primary-yellow); color: #000; box-shadow: 5px 5px 0px #F9A825; }

button:hover { transform: translate(-2px, -2px); box-shadow: 7px 7px 0px #000; }
button:active { transform: translate(2px, 2px); box-shadow: none; }
</style>
</head>

<body>

<audio id="music_menu" src="cloud9.mp3" loop></audio>
<audio id="music_game" src="just_the_way.mp3" loop></audio>
<audio id="music_battle" src="gone.mp3" loop></audio>
<audio id="music_final" src="extra.mp3" loop></audio>

<div id="menu" class="screen" style="display: flex;">
  <h1>POKÉMON YON</h1>
  <button class="btn-start" onclick="startGame()">NUEVA AVENTURA</button>
</div>

<div id="game" class="screen">
  <div id="hud">✨ AMOR: <span id="love">0</span></div>
  <div id="game-container"></div>
</div>

<div id="battle" class="screen">
  <div class="battle-box">
    <h2>¡BATALLA EMO-CIONAL!</h2>
    <button class="btn-love" onclick="choice(999)">⚡ AMAR POR SIEMPRE</button><br><br>
    <button class="btn-trust" onclick="choice(1)">💛 CONFIAR</button>
  </div>
</div>

<div id="final" class="screen"><div id="letter"></div></div>
<div id="trainer" class="screen"></div>

<script>
let scene, camera, renderer, yonSprite, pikaSprite;
let mode = "menu", love = 0, moveForward = false;

/* 🛠️ TEXTURA DE SUELO (Actualizada a Tonos Verdes y Amarillos) */
function createToonGrassTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 512; canvas.height = 512;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#2E7D32'; // Verde más profundo
    ctx.fillRect(0, 0, 512, 512);
    ctx.fillStyle = '#43A047';
    for(let i=0; i<200; i++) {
        ctx.fillRect(Math.random()*512, Math.random()*512, 8, 3);
    }
    ctx.fillStyle = '#FFEB3B'; // Flores amarillas
    for(let i=0; i<30; i++) {
        ctx.beginPath();
        ctx.arc(Math.random()*512, Math.random()*512, 3, 0, Math.PI*2);
        ctx.fill();
    }
    const texture = new THREE.CanvasTexture(canvas);
    texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
    texture.repeat.set(25, 25);
    return texture;
}

function initEngine() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000); // Espacio negro para resaltar el Cel-Shading

    camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('game-container').appendChild(renderer.domElement);

    const groundGeo = new THREE.PlaneGeometry(250, 250);
    const groundMat = new THREE.MeshToonMaterial({ map: createToonGrassTexture() });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    const sun = new THREE.DirectionalLight(0xffffff, 1.3);
    sun.position.set(5, 10, 7);
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));

    const loader = new THREE.TextureLoader();
    yonSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: loader.load('Yon.png'), alphaTest: 0.5 }));
    yonSprite.scale.set(2, 2, 1);
    yonSprite.position.y = 1;
    scene.add(yonSprite);

    pikaSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: loader.load('pikachu.png'), alphaTest: 0.5 }));
    pikaSprite.scale.set(1.2, 1.2, 1);
    pikaSprite.position.y = 0.6;
    scene.add(pikaSprite);

    camera.position.set(0, 3, 8);
    camera.lookAt(yonSprite.position);

    animate();
}

function animate() {
    if (mode !== "game") return;
    requestAnimationFrame(animate);
    const time = Date.now() * 0.005;

    yonSprite.scale.y = 2 + Math.sin(time * 0.8) * 0.05;
    pikaSprite.position.y = 0.6 + Math.cos(time * 1.2) * 0.05;

    if (moveForward) {
        yonSprite.position.z -= 0.15;
        yonSprite.rotation.z = Math.sin(time * 4) * 0.08;
        camera.position.z -= 0.15;
        if(Math.random() < 0.009) startBattle();
    }
    pikaSprite.position.lerp(new THREE.Vector3(yonSprite.position.x + 1.4, pikaSprite.position.y, yonSprite.position.z + 1.1), 0.12);
    renderer.render(scene, camera);
}

function startGame() {
    document.getElementById("menu").style.display = "none";
    document.getElementById("game").style.display = "block";
    mode = "game";
    playMusic("music_game");
    if (!scene) initEngine();
}

function startBattle() {
    mode = "battle";
    document.getElementById("battle").style.display = "flex";
    playMusic("music_battle");
}

function choice(v) {
    if (v === 999) triggerFinal();
    else {
        love += v;
        document.getElementById("love").innerText = love;
        document.getElementById("battle").style.display = "none";
        mode = "game";
        playMusic("music_game");
        animate();
    }
}

function triggerFinal() {
    mode = "final";
    document.getElementById("battle").style.display = "none";
    document.getElementById("final").style.display = "flex";
    playMusic("music_final");
    
    const text = `Hola Yon... ♥\n\nFeliz cumpleaños.\n\nTe amooo.\nAdmiro la persona increíble que eres.\nAún cuando todo se pone difícil...\nyo sigo eligiéndote.\n\nFelicidades, mi Yon. 🌸`;
    let i = 0;
    const box = document.getElementById("letter");
    const interval = setInterval(() => {
        box.textContent += text[i]; i++;
        if (i >= text.length) {
            clearInterval(interval);
            setTimeout(() => {
                document.getElementById("final").style.display = "none";
                document.getElementById("trainer").style.display = "flex";
            }, 6000);
        }
    }, 50);
}

function playMusic(id) {
    document.querySelectorAll('audio').forEach(a => { a.pause(); a.currentTime = 0; });
    document.getElementById(id).play().catch(()=>{});
}

window.addEventListener('keydown', e => { if (e.key === "ArrowUp") moveForward = true; });
window.addEventListener('keyup', e => { if (e.key === "ArrowUp") moveForward = false; });
window.addEventListener('click', () => { if(mode==="menu") playMusic("music_menu") }, {once:true});
</script>
</body>
</html>
