<!DOCTYPE html>
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon Yon — Inolvidable 💛</title>

<style>
:root{ --ui:#ffffff; }
*{box-sizing:border-box}

body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:monospace;
  overflow:hidden;
}

.screen{display:none;position:absolute;inset:0}
.screen.active{display:block}

#menu{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
}

button{
  padding:12px 16px;
  background:#000;
  color:#fff;
  border:2px solid var(--ui);
  cursor:pointer;
  font-family:inherit;
}

#map{
  width:100%;
  height:100%;
  background:url('img-fondo1.jpg') center/cover;
  position:relative;
}

.player{
  width:48px;
  height:48px;
  position:absolute;
  background-size:contain;
  background-repeat:no-repeat;
}

#yon{background-image:url('Yon.png')}
#pika{background-image:url('pikachu.png')}

#hud{
  position:fixed;
  top:10px;
  left:10px;
  background:#000;
  padding:10px;
  border:2px solid var(--ui);
  font-size:12px;
}

#dialog{
  position:fixed;
  bottom:0;
  width:100%;
  background:#000;
  padding:16px;
  display:none;
  border-top:2px solid var(--ui);
}

#battle{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
  background:url('img-fondo1.gif') center/cover no-repeat;
  width:100%;
  height:100vh;
}

#final{
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
  background:#000;
}
#letter{
  max-width:600px;
  white-space:pre-line;
  line-height:1.6;
}
</style>
</head>

<body>

<div id="menu" class="screen active">
  <h1>POKÉMON YON</h1>
  <button onclick="newGame()">Nueva Aventura</button>
  <button onclick="loadGame()">Continuar</button>
</div>

<div id="game" class="screen">
  <div id="map">
    <div id="yon" class="player"></div>
    <div id="pika" class="player"></div>
  </div>
  <div id="hud">Amor: <span id="love">0</span></div>
</div>

<div id="dialog"></div>

<div id="battle" class="screen">
  <h2>Batalla emo-cional</h2>
  <button onclick="choice(2)">⚡ Amar x100pre</button>
  <button onclick="choice(1)">💛 Confiar jiji</button>
  <button onclick="choice(-1)">💔 Dudar?</button>
</div>

<div id="final" class="screen">
  <div id="letter"></div>
</div>

<audio id="a1" src="cloud9.mp3" loop></audio>
<audio id="a2" src="just_the_way.mp3" loop></audio>
<audio id="a3" src="gone.mp3"></audio>
<audio id="a4" src="extra.mp3"></audio>

<script>
let yon, pika, dialog;
let a1,a2,a3,a4,tracks;

let state = JSON.parse(localStorage.getItem("yonGame")) || { love:0 };
function save(){ localStorage.setItem("yonGame", JSON.stringify(state)); }

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function initAudio(){
  a1 = document.getElementById("a1");
  a2 = document.getElementById("a2");
  a3 = document.getElementById("a3");
  a4 = document.getElementById("a4");
  tracks = [a1,a2,a3,a4];
}

function play(a){
  tracks.forEach(t=>{t.pause(); t.currentTime=0});
  a.play().catch(()=>{});
}

function newGame(){
  state={love:0};
  save();
  startGame();
}
function loadGame(){ startGame(); }

let pos={x:200,y:100};
let trail=[];
let lock=false;

function startGame(){
  show("game");
  play(a1);
  updateHUD();
  draw();

  setTimeout(()=>{
    showText([
      "¡Hola mi vidam!",
      "Bienvenido a esta pequeña aventura.",
      "Camina hacia abajo...",
      "Algo especial te espera."
    ]);
  },1000);
}

function draw(){
  yon.style.left=pos.x+"px";
  yon.style.top=pos.y+"px";

  trail.push({...pos});
  if(trail.length>10) trail.shift();

  let t=trail[0]||pos;
  pika.style.left=t.x+"px";
  pika.style.top=t.y+"px";
}

document.addEventListener("keydown",e=>{
  if(lock) return;

  if(e.key==="ArrowUp") pos.y-=5;
  if(e.key==="ArrowDown") pos.y+=5;
  if(e.key==="ArrowLeft") pos.x-=5;
  if(e.key==="ArrowRight") pos.x+=5;

  pos.x=Math.max(0,Math.min(window.innerWidth-48,pos.x));
  pos.y=Math.max(0,Math.min(window.innerHeight-48,pos.y));

  draw();
  check();
});

function check(){
  if(pos.y>window.innerHeight*0.7 && Math.random()<0.05){
    startBattle();
  }
}

function showText(arr,cb){
  dialog.style.display="block";
  let i=0;
  lock=true;

  function next(){
    if(i>=arr.length){
      dialog.style.display="none";
      lock=false;
      document.removeEventListener("keydown", enterHandler);
      dialog.onclick=null;
      if(cb) cb();
      return;
    }
    dialog.innerText=arr[i];
    i++;
  }

  function enterHandler(e){
    if(e.key==="Enter") next();
  }

  document.addEventListener("keydown", enterHandler);
  dialog.onclick = next;
  next();
}

function startBattle(){
  show("battle");
  play(a3);
}

function choice(v){
  state.love+=v;
  save();
  updateHUD();
  show("game");

  if(state.love>=10){
    setTimeout(finalScene,1000);
  }
}

function finalScene(){
  show("final");
  play(a4);

  document.getElementById("letter").textContent = `
Hola Yon... ♥

Feliz cumpleaños.

Pensé en escribirte algo súper profundo...
pero ya sabes que lo mío no es ser cursi.

Así que bueno, lo intentaré jiji

Te amooo.

Pero, sobre todo...
te respeto.
y te admiro muchísimo.

Admiro tu capacidad para soportarme kjjsj...

y la persona increíble que eres.

Aún cuando todo se pone difícil...

yo sigo eligiéndote.
`;
}

function updateHUD(){
  document.getElementById("love").textContent = state.love;
}

window.onload=()=>{
  yon = document.getElementById("yon");
  pika = document.getElementById("pika");
  dialog = document.getElementById("dialog");
  initAudio();
  show("menu");
  updateHUD();
};
</script>

</body>
</html>
