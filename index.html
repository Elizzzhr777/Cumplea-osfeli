<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pokémon Yon - 3D Cel Shaded Edition</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
.screen { display: none; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }

/* 1. MENU - Estética Anime */
#menu {
  flex-direction: column; justify-content: center; align-items: center;
  background: url('img-fondo1.gif') center/cover no-repeat;
}
#menu h1 { 
    font-size: 3rem; text-shadow: 3px 3px 0px #000; 
    -webkit-text-stroke: 1px white; color: #ffcb05;
}

/* 2. GAME (Contenedor para Three.js) */
#game-container { width: 100%; height: 100%; position: absolute; }
#hud { 
    position: absolute; top: 20px; left: 20px; z-index: 100;
    background: rgba(0,0,0,0.7); padding: 15px; border-radius: 50px;
    border: 2px solid #fff; font-weight: bold;
}

/* 3. BATTLE - Cel Shaded GIF */
#battle {
  flex-direction: column; justify-content: center; align-items: center;
  background: url('pikachu-pokemon.gif') center/cover no-repeat;
}

/* 4. FINAL - Collage Corregido */
#final {
  justify-content: center; align-items: center;
  background: url('Image-final.jpg') center/contain no-repeat #1a1a1a; /* 'contain' hace que se vea el collage completo */
}
#letter {
  background: rgba(0,0,0,0.9);
  width: 80%; max-width: 500px; padding: 25px;
  border: 2px solid #ffcb05; border-radius: 15px;
  color: #fff; line-height: 1.5; white-space: pre-wrap;
  box-shadow: 0 0 20px rgba(255,203,5,0.5);
  font-size: 1.1rem;
}

/* 5. TRAINER CARD FINAL */
#trainer { background: url('Trainer-card.png') center/contain no-repeat #000; }

/* 🪄 Efecto Cel Shading en Personajes (Filtros de contorno) */
.cel-character {
    filter: drop-shadow(1px 1px 0 black) drop-shadow(-1px -1px 0 black);
    image-rendering: pixelated; /* Mantiene el look nítido */
}

button { 
    padding: 15px 30px; cursor: pointer; background: #ffcb05; color: #2a75bb; 
    border: none; border-radius: 25px; font-size: 1.2rem; font-weight: bold;
    box-shadow: 0 4px 0 #c7a008; transition: 0.1s;
}
button:active { transform: translateY(4px); box-shadow: none; }
</style>
</head>

<body>

<audio id="music_menu" src="cloud9.mp3" loop></audio>
<audio id="music_game" src="just_the_way.mp3" loop></audio>
<audio id="music_battle" src="gone.mp3" loop></audio>
<audio id="music_final" src="extra.mp3" loop></audio>

<div id="menu" class="screen" style="display: flex;">
  <h1>POKÉMON YON 3D</h1>
  <button onclick="startGame()">INICIAR AVENTURA</button>
</div>

<div id="game" class="screen">
  <div id="hud">💖 AMOR: <span id="love">0</span></div>
  <div id="game-container"></div> </div>

<div id="battle" class="screen">
  <div style="background:rgba(0,0,0,0.8); padding:20px; border-radius:20px; text-align:center;">
    <h2 style="color:#ffcb05">¡BATALLA EMOCIONAL!</h2>
    <button onclick="choice(999)">⚡ AMAR POR SIEMPRE</button><br><br>
    <button onclick="choice(1)" style="background:#fff">💛 CONFIAR</button>
  </div>
</div>

<div id="final" class="screen">
  <div id="letter"></div>
</div>

<div id="trainer" class="screen"></div>

<script>
/* ==========================================================
   🎮 ENGINE 3D - INGENIERÍA DE VIDEOJUEGOS
   ========================================================== */
let scene, camera, renderer, yonSprite, pikaSprite;
let mode = "menu", love = 0;
let moveForward = false, moveBackward = false;

function init3D() {
    scene = new THREE.Scene();
    // Cámara Dinámica
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('game-container').appendChild(renderer.domElement);

    // Luz para simular Cel Shading
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(0, 10, 10);
    scene.add(light);

    // Suelo 3D con textura
    const loader = new THREE.TextureLoader();
    const groundTexture = loader.load('img-fondo1.jpg');
    groundTexture.wrapS = groundTexture.wrapT = THREE.RepeatWrapping;
    groundTexture.repeat.set(10, 10);
    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(100, 100),
        new THREE.MeshToonMaterial({ map: groundTexture }) // Material Toon/Cel Shaded
    );
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // Personajes (Usamos Sprites 3D con eliminación de fondo mediante AlphaTest)
    const yonTex = loader.load('Yon.png');
    const pikaTex = loader.load('pikachu.png');

    const materialYon = new THREE.SpriteMaterial({ map: yonTex, alphaTest: 0.5 });
    yonSprite = new THREE.Sprite(materialYon);
    yonSprite.scale.set(2, 2, 1);
    yonSprite.position.y = 1;
    scene.add(yonSprite);

    const materialPika = new THREE.SpriteMaterial({ map: pikaTex, alphaTest: 0.5 });
    pikaSprite = new THREE.Sprite(materialPika);
    pikaSprite.scale.set(1.2, 1.2, 1);
    pikaSprite.position.set(1.5, 0.6, -0.5);
    scene.add(pikaSprite);

    camera.position.set(0, 3, 6);
    camera.lookAt(yonSprite.position);

    animate3D();
}

/* --- 🧊 ANIMACIÓN DE LOCOMOCIÓN Y IDLE --- */
function animate3D() {
    if (mode !== "game") return;
    requestAnimationFrame(animate3D);

    const time = Date.now() * 0.005;

    // 1. Efecto de Respiración (Idle procedimental)
    yonSprite.scale.y = 2 + Math.sin(time) * 0.05;
    pikaSprite.scale.y = 1.2 + Math.cos(time) * 0.03;

    // 2. Movimiento Dinámico
    if (moveForward) {
        yonSprite.position.z -= 0.1;
        // Efecto balanceo al caminar
        yonSprite.rotation.z = Math.sin(time * 2) * 0.1;
        // Cámara Dinámica que sigue al jugador
        camera.position.z -= 0.1;
        
        // Probabilidad de encuentro
        if (Math.random() < 0.01) startBattle();
    }

    // Seguidor (Pikachu sigue a Yon con suavidad)
    pikaSprite.position.lerp(new THREE.Vector3(yonSprite.position.x + 1.2, 0.6, yonSprite.position.z + 0.8), 0.1);

    renderer.render(scene, camera);
}

/* --- ⚙️ LÓGICA DE CONTROL --- */
function startGame() {
    document.getElementById("menu").style.display = "none";
    document.getElementById("game").style.display = "block";
    mode = "game";
    playMusic("music_game");
    if (!scene) init3D();
}

function startBattle() {
    mode = "battle";
    document.getElementById("battle").style.display = "flex";
    playMusic("music_battle");
}

function choice(v) {
    if (v === 999) triggerFinal();
    else {
        love += v;
        document.getElementById("love").innerText = love;
        document.getElementById("battle").style.display = "none";
        mode = "game";
        playMusic("music_game");
        animate3D();
    }
}

function triggerFinal() {
    mode = "final";
    document.getElementById("battle").style.display = "none";
    document.getElementById("final").style.display = "flex";
    playMusic("music_final");

    const text = `Hola Yon... ♥\n\nFeliz cumpleaños.\n\nTe amooo.\nAdmiro la persona increíble que eres.\nAún cuando todo se pone difícil...\nyo sigo eligiéndote.\n\nDai. 🌸`;
    let i = 0;
    const box = document.getElementById("letter");
    const interval = setInterval(() => {
        box.textContent += text[i];
        i++;
        if (i >= text.length) {
            clearInterval(interval);
            setTimeout(() => {
                document.getElementById("final").style.display = "none";
                document.getElementById("trainer").style.display = "flex";
            }, 5000);
        }
    }, 50);
}

function playMusic(id) {
    document.querySelectorAll('audio').forEach(a => { a.pause(); a.currentTime = 0; });
    document.getElementById(id).play().catch(() => {});
}

window.addEventListener('keydown', e => { if (e.key === "ArrowUp") moveForward = true; });
window.addEventListener('keyup', e => { if (e.key === "ArrowUp") moveForward = false; });
window.addEventListener('click', () => { if(mode==="menu") playMusic("music_menu") }, {once:true});
</script>
</body>
</html>
