<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Aventura Pokémon para Yon</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<style>
body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
.screen { display: none; width: 100vw; height: 100vh; position: absolute; inset: 0; }

/* MENU */
#menu {
  flex-direction: column; justify-content: center; align-items: center;
  background: url('img-fondo1.gif') center/cover no-repeat;
}

/* SELECCIÓN DE NIVELES */
#level-select {
  flex-direction: column; justify-content: center; align-items: center;
  background: url('img-fondo1.gif') center/cover no-repeat;
}
.level-btn {
  width: 350px; display: flex; align-items: center; justify-content: flex-start; gap: 15px;
  margin-bottom: 15px; background: rgba(0,0,0,0.8); color: #ffcb05; 
  border: 2px solid #ffcb05; padding: 10px; border-radius: 15px;
}
.level-btn img { width: 40px; height: 40px; object-fit: contain; }
.locked { opacity: 0.5; filter: grayscale(100%); cursor: not-allowed; pointer-events: none; }

/* TRANSICIÓN DE NIVEL */
#level-transition {
  flex-direction: column; justify-content: center; align-items: center;
  background: rgba(0,0,0,0.9); z-index: 200;
}
.transition-box {
  background: #111; padding: 40px; border-radius: 20px; border: 3px solid #4CAF50;
  text-align: center; box-shadow: 0 0 20px #4CAF50;
}
.transition-icon {
  width: 120px; height: 120px; margin: 20px 0; border: 2px dashed #ffcb05; border-radius: 10px; object-fit: contain;
}

/* GAME UI */
#game-container { width: 100%; height: 100%; cursor: none; }
#hud { 
    position: absolute; top: 20px; left: 20px; z-index: 100;
    background: rgba(0,0,0,0.8); padding: 12px 25px; border-radius: 50px;
    border: 2px solid #ffcb05; font-weight: bold; font-size: 14px;
}

/* BATTLE */
#battle {
  flex-direction: column; justify-content: center; align-items: center;
  background: url('pikachu-pokemon.gif') center/cover no-repeat;
}

/* FINAL SCENE */
#final {
  justify-content: center; align-items: center;
  background: url('Image-final.jpg') center/contain no-repeat #111;
}
#letter {
  background: rgba(0,0,0,0.85); width: 85%; max-width: 550px; padding: 30px;
  border: 2px solid #ffcb05; border-radius: 20px; white-space: pre-wrap;
  box-shadow: 0 0 30px rgba(0,0,0,1); line-height: 1.6;
}

/* TRAINER CARD */
#trainer { background: url('Trainer-card.png') center/contain no-repeat #000; }

button { 
    padding: 15px 35px; cursor: pointer; background: #ffcb05; color: #2a75bb; 
    border: none; border-radius: 30px; font-weight: bold; letter-spacing: 1px;
    box-shadow: 0 5px 0 #c7a008; transition: 0.1s;
}
button:active { transform: translateY(3px); box-shadow: none; }
</style>
</head>

<body>

<audio id="music_menu" src="cloud9.mp3" loop></audio>
<audio id="music_game" src="just_the_way.mp3" loop></audio>
<audio id="music_battle" src="gone.mp3" loop></audio>
<audio id="music_final" src="extra.mp3" loop></audio>

<div id="menu" class="screen" style="display: flex;">
  <h1 style="font-size: 3.5rem; text-shadow: 4px 4px #2a75bb; -webkit-text-stroke: 2px white;">Aventura Pokémon para Yon</h1>
  <button onclick="showLevels()">INICIAR AVENTURA</button>
</div>

<div id="level-select" class="screen">
  <h2 style="font-size: 2.5rem; color: #ffcb05;">MAPA DE NIVELES</h2>
  <div style="display: flex; flex-direction: column; gap: 10px;">
    <button id="btn-lvl1" class="level-btn" onclick="startSpecificLevel(1)">
      <img src="icono-nivel-1.png"> NIVEL 1: Exploración 3D
    </button>
    <button id="btn-lvl2" class="level-btn locked" onclick="startSpecificLevel(2)">
      <img src="icono-nivel-2.png"> NIVEL 2: Batalla
    </button>
    <button id="btn-lvl3" class="level-btn locked" onclick="startSpecificLevel(3)">
      <img src="icono-nivel-3.png"> NIVEL 3: El Mensaje
    </button>
    <button id="btn-lvl4" class="level-btn locked" onclick="startSpecificLevel(4)">
      <img src="icono-nivel-4.png"> NIVEL 4: Trainer Card
    </button>
  </div>
</div>

<div id="level-transition" class="screen">
  <div class="transition-box">
    <h2 id="trans-title">¡NIVEL SUPERADO!</h2>
    <img id="transition-icon-img" class="transition-icon" src="">
    <br>
    <button onclick="goToNextLevel()">CONTINUAR AL NIVEL <span id="transition-next-num"></span></button>
  </div>
</div>

<div id="game" class="screen">
  <div id="hud">✨ AMOR: <span id="love">0</span></div>
  <div id="game-container"></div>
</div>

<div id="battle" class="screen">
  <div style="background:rgba(0,0,0,0.85); padding:30px; border-radius:25px; border:3px solid #ffcb05;">
    <h2 style="color:#ffcb05; margin-top:0;">¡BATALLA EMO-CIONAL!</h2>
    <button onclick="choice(999)">⚡ AMAR X100PRE</button><br><br>
    <button onclick="choice(1)" style="background:#fff; color:#333;"> ¿DUDAR?</button>
  </div>
</div>

<div id="final" class="screen"><div id="letter"></div></div>
<div id="trainer" class="screen"></div>

<script>
let scene, camera, renderer, yon3D, pika3D;
let mode = "menu", love = 0, moveForward = false;
let highestUnlockedLevel = 1, currentPlayingLevel = 1;

function showLevels() {
    hideAllScreens();
    document.getElementById("level-select").style.display = "flex";
    for(let i=1; i<=4; i++) {
        let btn = document.getElementById("btn-lvl"+i);
        if(i <= highestUnlockedLevel) { btn.classList.remove("locked"); btn.disabled = false; }
    }
    playMusic("music_menu");
}

function startSpecificLevel(level) {
    hideAllScreens();
    currentPlayingLevel = level;
    if(level === 1) {
        document.getElementById("game").style.display = "block";
        if (!scene) initEngine();
        playMusic("music_game");
        mode = "game";
    } else if(level === 2) {
        document.getElementById("battle").style.display = "flex";
        playMusic("music_battle");
    } else if(level === 3) {
        document.getElementById("final").style.display = "flex";
        playMusic("music_final");
        triggerFinalText();
    } else if(level === 4) {
        document.getElementById("trainer").style.display = "flex";
    }
}

function initEngine() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); 

    camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('game-container').appendChild(renderer.domElement);

    const groundGeo = new THREE.PlaneGeometry(500, 500);
    const groundMat = new THREE.MeshToonMaterial({ color: 0x4CAF50 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(5, 10, 7);
    scene.add(sun);

    // --- CARGA DE MODELOS 3D ---
    const loader = new THREE.GLTFLoader();

    // Línea 174: Cargar a YON (Protagonista)
    loader.load('Hitem3d-1777391060652.glb', (gltf) => {
        yon3D = gltf.scene;
        yon3D.scale.set(1.5, 1.5, 1.5);
        yon3D.position.y = 0;
        scene.add(yon3D);
    });

    // Línea 184: Cargar a PIKACHU (Acompañante)
    loader.load('Hitem3d-1777390520423.glb', (gltf) => {
        pika3D = gltf.scene;
        pika3D.scale.set(0.8, 0.8, 0.8);
        pika3D.position.set(1.5, 0, 1);
        scene.add(pika3D);
    });

    camera.position.set(0, 5, 10);
    animate();
}

function animate() {
    if (mode !== "game") return;
    requestAnimationFrame(animate);
    
    if (moveForward && yon3D) {
        yon3D.position.z -= 0.15;
        camera.position.z -= 0.15;
        
        // Pikachu sigue a Yon suavemente
        if(pika3D) {
            pika3D.position.lerp(new THREE.Vector3(yon3D.position.x + 1.2, 0, yon3D.position.z + 1.5), 0.1);
            pika3D.lookAt(yon3D.position);
        }

        if(Math.random() < 0.01) {
            moveForward = false;
            completeCurrentLevel();
        }
    }
    if(yon3D) camera.lookAt(yon3D.position);
    renderer.render(scene, camera);
}

function completeCurrentLevel() {
    if (currentPlayingLevel >= 4) { showLevels(); return; }
    let next = currentPlayingLevel + 1;
    highestUnlockedLevel = Math.max(highestUnlockedLevel, next);
    
    hideAllScreens();
    document.getElementById("level-transition").style.display = "flex";
    document.getElementById("transition-next-num").innerText = next;
    document.getElementById("transition-icon-img").src = "icono-nivel-" + next + ".png";
    mode = "transition";
}

function goToNextLevel() {
    startSpecificLevel(currentPlayingLevel + 1);
}

function hideAllScreens() {
    document.querySelectorAll('.screen').forEach(el => el.style.display = "none");
}

function choice(v) {
    if (v === 999) completeCurrentLevel();
    else { love += v; document.getElementById("love").innerText = love; }
}

function triggerFinalText() {
    const text = `Hola Yon... ♥\n\nFeliz cumpleaños.\n Pensaba escribirte algo súper profundo, pero ya sabes que no es lo mío, en fiin, Te amooo.\n Y admiro la persona increíble que eres.
    \n\n Gracias por estar conmigo estos ultimosúltimos años aunque a veces se complique todo, te seguiré escogiendo a tí una y mil veces<3
    \n Felices 20 mi vidam. 🌸`;
    let i = 0;
    const box = document.getElementById("letter");
    box.textContent = "";
    const interval = setInterval(() => {
        box.textContent += text[i]; i++;
        if (i >= text.length) {
            clearInterval(interval);
            setTimeout(() => completeCurrentLevel(), 5000);
        }
    }, 50);
}

function playMusic(id) {
    document.querySelectorAll('audio').forEach(a => { a.pause(); a.currentTime = 0; });
    document.getElementById(id).play().catch(()=>{});
}

window.addEventListener('keydown', e => { if (e.key === "ArrowUp") moveForward = true; });
window.addEventListener('keyup', e => { if (e.key === "ArrowUp") moveForward = false; });
</script>
</body>
</html>
