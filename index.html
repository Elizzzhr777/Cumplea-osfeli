<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pokémon Yon GBA</title>

<style>
body{
  margin:0;
  background:#000;
  overflow:hidden;
  font-family:monospace;
}

/* SCREEN */
.screen{display:none;position:absolute;inset:0}
.screen.active{display:block}

/* MENU */
#menu{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
  color:white;
  /* El GIF de fondo para la primera portada */
  background: url('img-fondo1.gif') center/cover no-repeat;
}

#menu h1 {
  background: rgba(0,0,0,0.6);
  padding: 10px 20px;
  border-radius: 8px;
}

/* GAME */
#game{
  position:relative;
  width:100vw;
  height:100vh;
  /* GIF de fondo en la aventura */
  background:url('img-fondo1.gif') center/cover no-repeat;
}

/* PLAYER */
.player{
  width:48px;
  height:48px;
  position:absolute;
  background-size:contain;
  background-repeat:no-repeat;
  transform-origin:bottom center;
  transition: transform 0.1s linear;
}

#yon{background-image:url('Yon.png')}
#pika{background-image:url('pikachu.png')}

/* HUD */
#hud{
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  background: rgba(0,0,0,0.5);
  padding: 5px 10px;
  border: 1px solid #fff;
}

/* BATTLE */
#battle{
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  height:100vh;
  color:white;
  /* El GIF de Pikachu para la pantalla de batalla */
  background: url('pikachu-pokemon.gif') center/cover no-repeat;
}

#battle h2 {
    background: rgba(0,0,0,0.7);
    padding: 10px;
}

/* FINAL */
#final{
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
  height:100vh;
  background: url('Image-final.jpg') center/cover no-repeat;
}

#letter{
    white-space:pre-line;
    background: rgba(0,0,0,0.8);
    padding: 20px;
    border-radius: 10px;
    max-width: 80%;
    max-height: 80vh;
    overflow-y: auto;
}

button {
    padding: 10px 20px;
    cursor: pointer;
    font-family: monospace;
    background: #000;
    color: #fff;
    border: 2px solid #fff;
    margin: 5px;
}
</style>
</head>

<body>

<audio id="music_menu" src="cloud9.mp3" loop></audio>
<audio id="music_game" src="just_the_way.mp3" loop></audio>
<audio id="music_battle" src="gone.mp3" loop></audio>
<audio id="music_final" src="extra.mp3" loop></audio>

<div id="menu" class="screen active">
  <h1>POKÉMON YON</h1>
  <button onclick="startGame()">Nueva Aventura</button>
</div>

<div id="game" class="screen">
  <div id="yon" class="player"></div>
  <div id="pika" class="player"></div>
  <div id="hud">Amor: <span id="love">0</span></div>
</div>

<div id="battle" class="screen">
  <h2>Batalla emo-cional</h2>
  <button onclick="choice(2)">⚡ Amar x100pre</button>
  <button onclick="choice(1)">💛 Confiar</button>
  <button onclick="choice(-1)">💔 Dudar?</button>
</div>

<div id="final" class="screen">
  <div id="letter"></div>
</div>

<script>
/* ========= CONFIG ========= */
const TILE = 48;

/* ========= STATE ========= */
let mode="menu";
let love=0;
let grid = {x:4,y:2};
let moving=false;
let trail=[];

/* ELEMENTS */
const yon = document.getElementById("yon");
const pika = document.getElementById("pika");

/* ========= AUDIO HELPER ========= */
function stopAllMusic() {
    document.querySelectorAll('audio').forEach(audio => {
        audio.pause();
        audio.currentTime = 0;
    });
}

function playMusic(id) {
    stopAllMusic();
    document.getElementById(id).play().catch(e => console.log("Audio waiting for interaction"));
}

/* ========= SCREEN ========= */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* ========= START ========= */
function startGame(){
  mode="game";
  show("game");
  playMusic("music_game");
  update();
}

/* ========= MOVEMENT ========= */
document.addEventListener("keydown",e=>{
  if(mode!=="game" || moving) return;

  let dx=0,dy=0;
  if(e.key==="ArrowUp") dy=-1;
  if(e.key==="ArrowDown") dy=1;
  if(e.key==="ArrowLeft") dx=-1;
  if(e.key==="ArrowRight") dx=1;

  if(dx!==0 || dy!==0) move(dx,dy);
});

function move(dx,dy){
  moving=true;
  grid.x+=dx;
  grid.y+=dy;

  animateMove(()=>{
    if(grid.y > 6) encounter();
    moving=false;
  });
}

function animateMove(cb){
  let startX = yon.offsetLeft;
  let startY = yon.offsetTop;
  let endX = grid.x*TILE;
  let endY = grid.y*TILE;
  let t=0;

  function step(){
    t+=0.1;
    let x = startX + (endX-startX)*t;
    let y = startY + (endY-startY)*t;

    yon.style.left = x+"px";
    yon.style.top = y+"px";

    let target = trail[trail.length-1] || {x:startX, y:startY};
    let px = parseFloat(pika.style.left)||x;
    let py = parseFloat(pika.style.top)||y;

    px += (target.x - px)*0.2;
    py += (target.y - py)*0.2;

    pika.style.left = px+"px";
    pika.style.top = py+"px";

    if(t<1) requestAnimationFrame(step);
    else {
      trail.push({x:endX,y:endY});
      if(trail.length>5) trail.shift();
      if(cb) cb();
    }
  }
  step();
}

function encounter(){
  if(Math.random()<0.3) startBattle();
}

function startBattle(){
  mode="battle";
  show("battle");
  playMusic("music_battle");
}

function choice(v){
  love+=v;
  document.getElementById("love").textContent=love;

  if(love>=10){
    finalScene();
  }else{
    mode="game";
    show("game");
    playMusic("music_game");
  }
}

function finalScene(){
  mode="final";
  show("final");
  playMusic("music_final");

  document.getElementById("letter").textContent = `
Hola Yon... ♥

Feliz cumpleaños.

Pensé en escribirte algo súper profundo...
pero ya sabes que lo mío no es ser cursi.

Así que bueno, lo intentaré jiji

Te amooo.

Pero, sobre todo...
te respeto.
y te admiro muchísimo.

Admiro tu capacidad para soportarme kjjsj...

y la persona increíble que eres.

Aún cuando todo se pone difícil...

yo sigo eligiéndote.
`;
}

function update(){
  yon.style.left = grid.x*TILE+"px";
  yon.style.top = grid.y*TILE+"px";
  pika.style.left = (grid.x*TILE-48)+"px";
  pika.style.top = (grid.y*TILE)+"px";
}

// Iniciar música de menú al primer clic
window.addEventListener('click', () => {
    if(mode === "menu") document.getElementById("music_menu").play();
}, {once: true});

</script>
</body>
</html>
