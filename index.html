<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Aventura Pokémon para Yon</title>

<style>
body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

/* ✨ BORDES FOSFORESCENTES GLOBALES */
* {
  box-shadow: 0 0 5px rgba(255,203,5,0.2);
}

/* Pantallas */
.screen {
  display: none;
  width: 100vw;
  height: 100vh;
  position: absolute;
  inset: 0;
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(1.03); }
  to { opacity: 1; transform: scale(1); }
}

/* MENÚ */
#menu, #level-select {
  flex-direction: column; justify-content: center; align-items: center;
  background: url('img-fondo1.gif') center/cover no-repeat;
}

h1 {
  animation: glowText 2s infinite alternate;
}

@keyframes glowText {
  from { text-shadow: 0 0 10px #fff; }
  to { text-shadow: 0 0 25px #ffcb05, 0 0 40px #2a75bb; }
}

/* BOTONES */
button { 
    padding: 15px 35px; cursor: pointer; background: #ffcb05; color: #2a75bb; 
    border: none; border-radius: 30px; font-weight: bold;
    box-shadow: 0 0 10px #ffcb05, 0 5px 0 #c7a008;
    transition: 0.15s;
}
button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #ffcb05;
}
button:active { transform: translateY(3px); }

/* LEVEL BUTTON */
.level-btn {
  width: 350px; display: flex; align-items: center; gap: 15px;
  margin-bottom: 15px; background: rgba(0,0,0,0.8); color: #ffcb05; 
  border: 2px solid #ffcb05; padding: 10px; border-radius: 15px;
}
.level-btn:hover { transform: scale(1.05); }

/* PLAYLIST */
#playlist-screen {
  flex-direction: column; justify-content: center; align-items: center;
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('img-fondo1.gif') center/cover no-repeat;
}

.song-item {
  background: rgba(0,0,0,0.6); margin: 10px 0; padding: 15px;
  border-radius: 15px; cursor: pointer;
}
.song-item:hover { transform: scale(1.05); }

/* FINAL */
#final { 
  justify-content: center; align-items: center;
  background: url('Image-final.jpg') center/contain no-repeat #111;
  background-size: contain;
  opacity: 0;
  transition: opacity 3s ease;
}

#final.show-bg {
  opacity: 1;
}

#letter {
  background: rgba(0,0,0,0.85);
  padding: 30px;
  border: 2px solid #ffcb05;
  border-radius: 20px;
  white-space: pre-wrap;
  box-shadow: 0 0 20px #ffcb05;
  animation: letterFade 2s ease;
}

@keyframes letterFade {
  from { opacity: 0; transform: translateY(20px);}
  to { opacity: 1; transform: translateY(0);}
}

/* PARTICULAS SOLO FINAL */
#particles-final {
  position: absolute;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
</style>
</head>

<body>

<audio id="music_menu" src="cloud9.mp3" loop></audio>
<audio id="music_game" src="just_the_way.mp3" loop></audio>
<audio id="music_battle" src="gone.mp3" loop></audio>
<audio id="music_final" src="extra.mp3" loop></audio>

<!-- SFX -->
<audio id="sfx_click" src="click.mp3"></audio>
<audio id="sfx_hover" src="hover.mp3"></audio>
<audio id="sfx_success" src="success.mp3"></audio>
<audio id="sfx_error" src="error.mp3"></audio>

<div id="menu" class="screen" style="display: flex;">
  <h1>¡20 años de supervivencia!</h1>
  <button onclick="showLevels()">INICIAR AVENTURA</button>
</div>

<div id="level-select" class="screen">
  <h2>MAPA DE NIVELES</h2>
  <button id="btn-lvl1" onclick="startSpecificLevel(1)">NIVEL 1</button>
  <button id="btn-lvl2" onclick="startSpecificLevel(2)">NIVEL 2</button>
  <button id="btn-lvl3" onclick="startSpecificLevel(3)">NIVEL 3</button>
  <button id="btn-lvl4" onclick="startSpecificLevel(4)">NIVEL 4</button>
</div>

<div id="playlist-screen" class="screen">
  <div class="song-item" onclick="playMusic('music_menu')">Cloud 9</div>
  <button onclick="completeCurrentLevel()">LISTO</button>
</div>

<div id="battle" class="screen">
  <button onclick="choice(999)">AMAR</button>
  <button onclick="choice(1)">DUDAR</button>
</div>

<div id="final" class="screen">
  <canvas id="particles-final"></canvas>
  <div id="letter"></div>
</div>

<script>
let currentPlayingLevel = 1;

function hideAllScreens() {
  document.querySelectorAll('.screen').forEach(el => el.style.display = "none");
}

function showLevels() {
  hideAllScreens();
  document.getElementById("level-select").style.display = "flex";
}

function startSpecificLevel(level) {
  hideAllScreens();
  currentPlayingLevel = level;

  if(level === 3) {
    const final = document.getElementById("final");
    final.style.display = "flex";

    setTimeout(()=> final.classList.add("show-bg"), 500);

    triggerFinalText();
    startParticles();
  }
}

function completeCurrentLevel(){}

function choice(v){
  if(v===999){ completeCurrentLevel(); }
}

/* TEXTO */
function triggerFinalText() {
  const text = `Hola Yon... ♥\n\nFeliz cumpleaños...\nTe amo mucho.`;
  let i=0;
  const box = document.getElementById("letter");
  box.textContent="";

  const interval = setInterval(()=>{
    box.textContent+=text[i];
    i++;
    if(i>=text.length){ clearInterval(interval); }
  },50);
}

/* SFX */
function playSFX(id){
  const sfx=document.getElementById(id);
  if(sfx){ sfx.currentTime=0; sfx.play().catch(()=>{});}
}

document.querySelectorAll("button").forEach(btn=>{
  btn.addEventListener("mouseenter",()=>playSFX("sfx_hover"));
  btn.addEventListener("click",()=>playSFX("sfx_click"));
});

/* PARTICULAS FINAL */
function startParticles(){
  const canvas=document.getElementById("particles-final");
  const ctx=canvas.getContext("2d");
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;

  let particles=[];
  for(let i=0;i<80;i++){
    particles.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      r:Math.random()*3+1
    });
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#ffcb05";
    particles.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fill();
      p.y-=0.5;
      if(p.y<0){ p.y=canvas.height; }
    });
  }

  setInterval(draw,30);
}
</script>
</body>
</html>
